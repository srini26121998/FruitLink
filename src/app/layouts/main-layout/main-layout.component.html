<div class="min-h-screen w-full bg-gray-100">

  <div class="flex min-h-screen">

    <app-sidebar></app-sidebar>

    <div class="flex flex-col flex-1 min-h-screen transition-all duration-300"
         [class.lg:ml-64]="!sidebar.collapsed() && !sidebar.isMobile()"
         [class.lg:ml-20]="sidebar.collapsed() && !sidebar.isMobile()"
         [class.ml-0]="sidebar.isMobile()">

      <app-header class="sticky top-0 h-16 bg-white shadow z-20"></app-header>

      <main class="flex-1 p-4">
        <router-outlet></router-outlet>
      </main>

      <app-footer class="mt-auto p-4 text-center text-gray-500 text-sm"></app-footer>
    </div>

  </div>

  <app-idle-warning></app-idle-warning>
</div>

<app-toaster></app-toaster>
<app-loader-overlay></app-loader-overlay>
