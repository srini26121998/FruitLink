<div class="min-h-screen w-full bg-gray-50">

  <div class="flex min-h-screen">

    <app-sidebar></app-sidebar>

    <div class="flex flex-col flex-1 min-h-screen min-w-0 transition-all duration-300"
         [class.lg:ml-64]="!sidebar.collapsed() && !sidebar.isMobile()"
         [class.lg:ml-[72px]]="sidebar.collapsed() && !sidebar.isMobile()"
         [class.ml-0]="sidebar.isMobile()">

      <app-header class="sticky top-0 z-20"></app-header>

      <main class="flex-1 p-2 sm:p-3 md:p-4 overflow-x-hidden">
        <router-outlet></router-outlet>
      </main>

      <app-footer class="mt-auto"></app-footer>
    </div>

  </div>

  <app-idle-warning></app-idle-warning>
</div>

<app-toaster></app-toaster>
<app-loader-overlay></app-loader-overlay>
