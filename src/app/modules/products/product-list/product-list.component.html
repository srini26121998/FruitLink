<div class="p-4">

  <!-- Header -->
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-primary">Fruit List</h2>
    <a 
      routerLink="/fruits/add"
      class="bg-primary text-white px-4 py-2 rounded-lg shadow hover:bg-primary/80 transition">
      + Add Fruit
    </a>
  </div>

  <!-- Search Bar -->
  <div class="mb-4">
    <input 
      type="text" 
      placeholder="Search fruits..."
      class="w-full border rounded-lg px-3 py-2 focus:ring focus:ring-primary/40"
    />
  </div>

  <!-- Fruits Table -->
  <div class="bg-white p-6 rounded-xl shadow">
    <table class="w-full border-collapse">
      <thead>
        <tr class="bg-gray-100 text-left">
          <th class="px-4 py-2 text-sm font-semibold">Fruit</th>
          <th class="px-4 py-2 text-sm font-semibold">Category</th>
          <th class="px-4 py-2 text-sm font-semibold">Price (₹/kg)</th>
          <th class="px-4 py-2 text-sm font-semibold">Status</th>
          <th class="px-4 py-2 text-sm font-semibold">Action</th>
        </tr>
      </thead>

      <tbody>
        <tr class="border-b">
          <td class="px-4 py-2">Apple</td>
          <td class="px-4 py-2">Seasonal</td>
          <td class="px-4 py-2">120</td>
          <td class="px-4 py-2">
            <span class="bg-green-100 text-green-600 px-2 py-1 text-xs rounded">Active</span>
          </td>
          <td class="px-4 py-2">
            <a routerLink="/fruits/edit" class="text-primary hover:underline text-sm">Edit</a>
          </td>
        </tr>

        <tr class="border-b">
          <td class="px-4 py-2">Banana</td>
          <td class="px-4 py-2">Daily</td>
          <td class="px-4 py-2">45</td>
          <td class="px-4 py-2">
            <span class="bg-green-100 text-green-600 px-2 py-1 text-xs rounded">Active</span>
          </td>
          <td class="px-4 py-2">
            <a routerLink="/fruits/edit" class="text-primary hover:underline text-sm">Edit</a>
          </td>
        </tr>

      </tbody>
    </table>
  </div>

</div>
