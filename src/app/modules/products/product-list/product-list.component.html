<div class="p-3 sm:p-4 md:p-6 max-w-[1400px] mx-auto space-y-4">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 animate-fade-in-down">
    <div>
      <h2 class="text-lg sm:text-xl font-semibold text-gray-900 tracking-tight">Fruit List</h2>
      <p class="text-xs sm:text-sm text-gray-500 mt-0.5 font-medium">Manage your product catalog</p>
    </div>
    <a 
      routerLink="/fruits/add"
      class="btn-primary w-full sm:w-auto text-center">
      <span class="material-symbols-rounded" style="font-size:18px;">add</span>
      Add Fruit
    </a>
  </div>

  <!-- Search Bar -->
  <div class="animate-fade-in-up delay-100">
    <div class="relative">
      <svg class="w-4 h-4 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input 
        type="text" 
        placeholder="Search fruits..."
        class="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-200 rounded-xl bg-gray-50/50 focus:bg-white focus:ring-2 focus:ring-green-500/20 focus:border-green-400 outline-none transition-all"
      />
    </div>
  </div>

  <!-- MOBILE: Card View -->
  <div class="block sm:hidden space-y-3 animate-fade-in-up delay-150">
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 hover:shadow-md transition-shadow">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-red-100 to-pink-100 rounded-xl flex items-center justify-center text-lg">🍎</div>
          <div>
            <p class="text-sm font-semibold text-gray-900">Apple</p>
            <p class="text-xs text-gray-500">Seasonal</p>
          </div>
        </div>
        <span class="bg-green-100 text-green-600 px-2.5 py-1 text-[10px] font-semibold rounded-full">Active</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-sm font-bold text-gray-900">₹120<span class="text-xs text-gray-400 font-normal">/kg</span></span>
        <a routerLink="/fruits/edit" class="text-xs font-medium text-green-600 hover:text-green-700 px-3 py-1.5 bg-green-50 rounded-lg transition-colors">Edit</a>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 hover:shadow-md transition-shadow">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-yellow-100 to-amber-100 rounded-xl flex items-center justify-center text-lg">🍌</div>
          <div>
            <p class="text-sm font-semibold text-gray-900">Banana</p>
            <p class="text-xs text-gray-500">Daily</p>
          </div>
        </div>
        <span class="bg-green-100 text-green-600 px-2.5 py-1 text-[10px] font-semibold rounded-full">Active</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-sm font-bold text-gray-900">₹45<span class="text-xs text-gray-400 font-normal">/kg</span></span>
        <a routerLink="/fruits/edit" class="text-xs font-medium text-green-600 hover:text-green-700 px-3 py-1.5 bg-green-50 rounded-lg transition-colors">Edit</a>
      </div>
    </div>
  </div>

  <!-- DESKTOP: Table View -->
  <div class="hidden sm:block bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden animate-fade-in-up delay-150">
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left">
        <thead class="bg-gray-50/80 border-b border-gray-100">
          <tr>
            <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Fruit</th>
            <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Category</th>
            <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Price (₹/kg)</th>
            <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
            <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Action</th>
          </tr>
        </thead>

        <tbody class="divide-y divide-gray-50">
          <tr class="hover:bg-green-50/30 transition-colors group">
            <td class="px-4 py-3">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-red-100 to-pink-100 rounded-lg flex items-center justify-center text-sm">🍎</div>
                <span class="font-medium text-gray-900">Apple</span>
              </div>
            </td>
            <td class="px-4 py-3 text-gray-600">Seasonal</td>
            <td class="px-4 py-3 font-semibold text-gray-900">₹120</td>
            <td class="px-4 py-3">
              <span class="bg-green-100 text-green-700 px-2.5 py-1 text-[10px] font-semibold rounded-full border border-green-200">Active</span>
            </td>
            <td class="px-4 py-3">
              <a routerLink="/fruits/edit" class="text-sm font-medium text-green-600 hover:text-green-700 transition-colors">Edit</a>
            </td>
          </tr>

          <tr class="hover:bg-green-50/30 transition-colors group">
            <td class="px-4 py-3">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-yellow-100 to-amber-100 rounded-lg flex items-center justify-center text-sm">🍌</div>
                <span class="font-medium text-gray-900">Banana</span>
              </div>
            </td>
            <td class="px-4 py-3 text-gray-600">Daily</td>
            <td class="px-4 py-3 font-semibold text-gray-900">₹45</td>
            <td class="px-4 py-3">
              <span class="bg-green-100 text-green-700 px-2.5 py-1 text-[10px] font-semibold rounded-full border border-green-200">Active</span>
            </td>
            <td class="px-4 py-3">
              <a routerLink="/fruits/edit" class="text-sm font-medium text-green-600 hover:text-green-700 transition-colors">Edit</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
