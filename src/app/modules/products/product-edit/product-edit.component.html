<div class="p-2">

  <h2 class="text-base font-medium text-primary mb-2">Edit Fruit</h2>

  <div class="bg-white p-2 rounded-xl shadow max-w-2xl">

    <form class="space-y-2">

      <div>
        <label class="block mb-1 font-semibold">Fruit Name</label>
        <input
          type="text"
          value="Apple"
          class="w-full border rounded-lg px-3 py-2"
        />
      </div>

      <div>
        <label class="block mb-1 font-semibold">Category</label>
        <select class="w-full border rounded-lg px-3 py-2">
          <option>Seasonal</option>
          <option>Daily</option>
          <option>Imported</option>
        </select>
      </div>

      <div>
        <label class="block mb-1 font-semibold">Price (₹/kg)</label>
        <input
          type="number"
          value="120"
          class="w-full border rounded-lg px-3 py-2"
        />
      </div>

      <div>
        <label class="block mb-1 font-semibold">Fruit Image</label>
        <input
          type="file"
          class="border rounded-lg p-2 w-full"
        />
      </div>

      <div>
        <label class="block mb-1 font-semibold">Status</label>
        <select class="w-full border rounded-lg px-3 py-2">
          <option>Active</option>
          <option>Inactive</option>
        </select>
      </div>

      <button class="bg-primary text-white px-2 py-2 rounded-lg">
        Update Fruit
      </button>

    </form>

  </div>

</div>
