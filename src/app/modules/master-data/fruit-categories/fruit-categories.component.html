<div class="p-4">

  <h2 class="text-2xl font-bold text-primary mb-6">Fruit Categories</h2>

  <!-- Add Button -->
  <div class="flex justify-end mb-4">
    <button class="bg-primary text-white px-4 py-2 rounded-lg">
      + Add Category
    </button>
  </div>

  <!-- Table -->
  <div class="bg-white p-6 rounded-xl shadow">

    <table class="w-full border-collapse">
      <thead class="bg-gray-100">
        <tr>
          <th class="px-4 py-2 text-sm font-semibold">Category</th>
          <th class="px-4 py-2 text-sm font-semibold">Description</th>
          <th class="px-4 py-2 text-sm font-semibold">Action</th>
        </tr>
      </thead>

      <tbody>

        <tr class="border-b">
          <td class="px-4 py-2">Seasonal Fruits</td>
          <td class="px-4 py-2">Fruits available in specific seasons</td>
          <td class="px-4 py-2">
            <button class="text-primary hover:underline text-sm">Edit</button>
          </td>
        </tr>

        <tr>
          <td class="px-4 py-2">Daily Fruits</td>
          <td class="px-4 py-2">Regularly available fruits</td>
          <td class="px-4 py-2">
            <button class="text-primary hover:underline text-sm">Edit</button>
          </td>
        </tr>

      </tbody>
    </table>

  </div>

</div>
