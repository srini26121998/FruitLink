<div class="p-2">

  <h2 class="text-base font-medium text-primary mb-2">Cities Management</h2>

  <!-- Add City -->
  <div class="flex justify-end mb-2">
    <button class="bg-primary text-white px-2 py-2 rounded-lg">
      + Add City
    </button>
  </div>

  <!-- City Table -->
  <div class="bg-white p-2 rounded-xl shadow">
    <table class="w-full border-collapse">
      <thead class="bg-gray-100">
        <tr>
          <th class="px-2 py-2 text-sm font-semibold">City Name</th>
          <th class="px-2 py-2 text-sm font-semibold">Status</th>
          <th class="px-2 py-2 text-sm font-semibold">Action</th>
        </tr>
      </thead>

      <tbody>

        <tr class="border-b">
          <td class="px-2 py-2">Chennai</td>
          <td class="px-2 py-2">
            <span class="bg-green-100 text-green-600 px-2 py-1 rounded text-xs">Active</span>
          </td>
          <td class="px-2 py-2">
            <button class="text-primary hover:underline text-sm">Edit</button>
          </td>
        </tr>

        <tr>
          <td class="px-2 py-2">Coimbatore</td>
          <td class="px-2 py-2">
            <span class="bg-yellow-100 text-yellow-600 px-2 py-1 rounded text-xs">Inactive</span>
          </td>
          <td class="px-2 py-2">
            <button class="text-primary hover:underline text-sm">Edit</button>
          </td>
        </tr>

      </tbody>
    </table>
  </div>

</div>
