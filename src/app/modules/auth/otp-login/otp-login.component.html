<div class="flex min-h-screen items-center justify-center bg-gray-100">
  <div class="bg-white shadow-lg rounded-xl p-2 w-full max-w-md">
    
    <h2 class="text-base font-medium text-center text-primary mb-2">
      Login with OTP
    </h2>

    <form class="space-y-2">

      <!-- Mobile -->
      <div>
        <label class="block text-sm font-semibold mb-1">Mobile Number</label>
        <input 
          type="tel"
          class="w-full border rounded-lg px-3 py-2 focus:ring focus:ring-primary/40 focus:outline-none"
          placeholder="Enter mobile number"
        />
      </div>

      <!-- Send OTP -->
      <button 
        class="w-full bg-primary text-white py-2 rounded-lg font-semibold hover:bg-primary/80 transition">
        Send OTP
      </button>

      <!-- OTP input -->
      <div>
        <label class="block text-sm font-semibold mb-1">Enter OTP</label>
        <input 
          type="number"
          class="w-full border rounded-lg px-3 py-2 focus:ring focus:ring-primary/40 focus:outline-none"
          placeholder="Enter 6-digit OTP"
        />
      </div>

      <!-- Login -->
      <button 
        class="w-full bg-primary text-white py-2 rounded-lg font-semibold hover:bg-primary/80 transition">
        Verify OTP
      </button>
    </form>

    <div class="text-center mt-2">
      <a routerLink="/auth/login" class="text-primary text-sm hover:underline">
        Back to Login
      </a>
    </div>

  </div>
</div>
