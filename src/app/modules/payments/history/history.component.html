<div class="p-2">

  <h2 class="text-base font-medium text-primary mb-2">Payment History</h2>

  <!-- Search & Filters -->
  <div class="flex justify-between mb-2">
    <div class="relative w-1/3">
      
      <input
        type="text"
        placeholder="Search payments..."
        class="border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary focus:border-primary block w-full pl-10 p-2.5 outline-none transition-colors"
        [(ngModel)]="searchTerm"
        (input)="currentPage = 1"
      />
    </div>

    <select class="animated-dropdown w-full" [(ngModel)]="statusFilter" (change)="currentPage = 1">
      <option value="All">All Statuses</option>
      <option value="Success">Success</option>
      <option value="Pending">Pending</option>
      <option value="Failed">Failed</option>
    </select>
  </div>

  <!-- Payments Table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left text-gray-500">
        <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b border-gray-200">
          <tr>
            <th scope="col" class="px-2 py-2 cursor-pointer hover:bg-gray-100 transition-colors" (click)="sortBy('id')">
              <div class="flex items-center">
                Payment ID
                <span class="ml-1 text-gray-400">
                  <svg *ngIf="sortColumn !== 'id'" class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
                  </svg>
                  <svg *ngIf="sortColumn === 'id' && sortDirection === 'asc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                  </svg>
                  <svg *ngIf="sortColumn === 'id' && sortDirection === 'desc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5 12 21m0 0-7.5-7.5M12 21V3" />
                  </svg>
                </span>
              </div>
            </th>
            <th scope="col" class="px-2 py-2 cursor-pointer hover:bg-gray-100 transition-colors" (click)="sortBy('amount')">
              <div class="flex items-center">
                Amount (₹)
                <span class="ml-1 text-gray-400">
                  <svg *ngIf="sortColumn !== 'amount'" class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
                  </svg>
                  <svg *ngIf="sortColumn === 'amount' && sortDirection === 'asc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                  </svg>
                  <svg *ngIf="sortColumn === 'amount' && sortDirection === 'desc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5 12 21m0 0-7.5-7.5M12 21V3" />
                  </svg>
                </span>
              </div>
            </th>
            <th scope="col" class="px-2 py-2 cursor-pointer hover:bg-gray-100 transition-colors" (click)="sortBy('date')">
              <div class="flex items-center">
                Date
                <span class="ml-1 text-gray-400">
                  <svg *ngIf="sortColumn !== 'date'" class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
                  </svg>
                  <svg *ngIf="sortColumn === 'date' && sortDirection === 'asc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                  </svg>
                  <svg *ngIf="sortColumn === 'date' && sortDirection === 'desc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5 12 21m0 0-7.5-7.5M12 21V3" />
                  </svg>
                </span>
              </div>
            </th>
            <th scope="col" class="px-2 py-2 cursor-pointer hover:bg-gray-100 transition-colors" (click)="sortBy('status')">
              <div class="flex items-center">
                Status
                <span class="ml-1 text-gray-400">
                  <svg *ngIf="sortColumn !== 'status'" class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
                  </svg>
                  <svg *ngIf="sortColumn === 'status' && sortDirection === 'asc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                  </svg>
                  <svg *ngIf="sortColumn === 'status' && sortDirection === 'desc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5 12 21m0 0-7.5-7.5M12 21V3" />
                  </svg>
                </span>
              </div>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="paginatedPayments.length === 0">
            <td colspan="4" class="px-2 py-4 text-center text-gray-500">
              <div class="flex flex-col items-center justify-center">
                <svg class="w-10 h-10 text-gray-300 mb-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                </svg>
                <p class="text-base font-medium">No payments found</p>
                <p class="text-sm">Try adjusting your search or filters.</p>
              </div>
            </td>
          </tr>
          
          <tr *ngFor="let p of paginatedPayments" class="bg-white border-b border-gray-100 hover:bg-gray-50 transition-colors">
            <td class="px-2 py-2 font-medium text-gray-900 whitespace-nowrap">{{ p.id }}</td>
            <td class="px-2 py-2 font-medium text-gray-900">₹ {{ p.amount | number }}</td>
            <td class="px-2 py-2">{{ p.date }}</td>
            <td class="px-2 py-2">
              <span [ngClass]="{
                'bg-yellow-100 text-yellow-800 border-yellow-200': p.status === 'Pending',
                'bg-green-100 text-green-800 border-green-200': p.status === 'Success',
                'bg-red-100 text-red-800 border-red-200': p.status === 'Failed'
              }" class="px-2.5 py-1 text-xs font-semibold rounded-full border">
                {{ p.status }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="px-2 py-2 flex items-center justify-between border-t border-gray-100 bg-gray-50" *ngIf="totalPages > 0">
      <div class="text-sm text-gray-500">
        Showing <span class="font-medium text-gray-900">{{ showingStartIndex }}</span> to <span class="font-medium text-gray-900">{{ showingEndIndex }}</span> of <span class="font-medium text-gray-900">{{ filteredPayments.length }}</span> entries
      </div>
      
      <div class="inline-flex rounded-md shadow-sm">
        <button 
          (click)="setPage(currentPage - 1)" 
          [disabled]="currentPage === 1"
          class="px-3 py-2 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-l-lg hover:bg-gray-100 hover:text-gray-700 disabled:opacity-50 disabled:bg-gray-50 disabled:cursor-not-allowed transition-colors">
          Previous
        </button>
        
        <button 
          *ngFor="let page of pages" 
          (click)="setPage(page)"
          [ngClass]="{
            'z-10 text-primary bg-primary/10 border-primary': currentPage === page,
            'text-gray-500 bg-white border-gray-300 hover:bg-gray-100 hover:text-gray-700': currentPage !== page
          }"
          class="px-3 py-2 text-sm font-medium border-t border-b transition-colors -ml-px first:ml-0">
          {{ page }}
        </button>

        <button 
          (click)="setPage(currentPage + 1)" 
          [disabled]="currentPage === totalPages"
          class="px-3 py-2 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-r-lg hover:bg-gray-100 hover:text-gray-700 disabled:opacity-50 disabled:bg-gray-50 disabled:cursor-not-allowed transition-colors -ml-px">
          Next
        </button>
      </div>
    </div>
  </div>

</div>
