<div class="p-2 max-w-xl mx-auto space-y-2">

  <div class="flex items-center gap-3">
    <button (click)="goBack()" title="Go Back" class="p-1.5 bg-gray-100 text-gray-600 rounded-md hover:bg-gray-200 transition-colors shadow-sm border border-gray-200">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </button>
    <h1 class="text-base font-medium mb-0">Add Settlement: {{ shopId }}</h1>
  </div>

  <p class="text-gray-600">Outstanding: 
    <span class="font-bold text-red-600">₹ {{ outstanding }}</span>
  </p>

  <form [formGroup]="form" class="space-y-2">

    <input type="number" formControlName="amount"
           placeholder="Enter payment amount"
           class="w-full p-3 border rounded"/>

    <textarea formControlName="remarks" rows="2"
              class="w-full p-3 border rounded"
              placeholder="Remarks"></textarea>

    <button (click)="submit()" 
            class="w-full bg-green-600 text-white px-2 py-3 rounded text-lg disabled:bg-green-600"
            [disabled]="form.invalid">
      ✔ Save Settlement
    </button>
  </form>

</div>
