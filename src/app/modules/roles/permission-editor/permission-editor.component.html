<div class="p-2 max-w-4xl mx-auto flex flex-col gap-2">
  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-2 bg-white p-2 rounded shadow-sm border border-gray-100 shrink-0">
    <div>
      <h2 class="text-base font-medium text-gray-900 m-0">Permission Editor</h2>
      <p class="text-xs text-gray-500 mt-0.5 m-0">Add new permissions to the system master list</p>
    </div>
  </div>

  <div class="bg-white rounded shadow-sm border border-gray-100 p-4 flex flex-col gap-4 relative overflow-hidden">
    <!-- Decorative top accent -->
    <div class="absolute top-0 left-0 right-0 h-1 bg-green-500"></div>

    <div *ngIf="success()" class="bg-green-50 border border-green-200 text-green-700 px-3 py-2 rounded text-xs flex items-center gap-2">
      <span class="material-symbols-rounded text-[16px]">check_circle</span>
      {{ success() }}
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Permission ID</label>
        <input class="w-full border border-gray-200 py-1.5 px-3 rounded focus:outline-none focus:ring-1 focus:ring-green-500 text-xs bg-gray-50" placeholder="e.g. create_orders" [formControl]="id" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Label</label>
        <input class="w-full border border-gray-200 py-1.5 px-3 rounded focus:outline-none focus:ring-1 focus:ring-green-500 text-xs bg-gray-50" placeholder="e.g. Create Orders" [formControl]="label" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Resource</label>
        <input class="w-full border border-gray-200 py-1.5 px-3 rounded focus:outline-none focus:ring-1 focus:ring-green-500 text-xs bg-gray-50" placeholder="e.g. orders" [formControl]="resource" />
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-700 mb-1">Action</label>
        <input class="w-full border border-gray-200 py-1.5 px-3 rounded focus:outline-none focus:ring-1 focus:ring-green-500 text-xs bg-gray-50" placeholder="e.g. create" [formControl]="action" />
      </div>
    </div>

    <div class="flex justify-end pt-2 border-t border-gray-100">
      <button class="px-3 py-1.5 bg-green-600 hover:bg-green-700 text-white text-xs font-medium rounded transition-colors shadow-sm flex items-center gap-1" (click)="addPermission()">
        <span class="material-symbols-rounded text-[16px]">add</span>
        Add Permission
      </button>
    </div>
  </div>
</div>
