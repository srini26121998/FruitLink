<div class="max-w-2xl mx-auto p-6 md:p-8">
  
  <!-- Header Section with Back Button -->
  <div class="flex items-center mb-8">
    <button 
      (click)="goBack()" 
      class="mr-4 p-2 rounded-full hover:bg-gray-100 transition-colors flex items-center justify-center text-gray-600 focus:outline-none"
      title="Go Back">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </button>
    <div>
      <h2 class="text-3xl font-semibold text-gray-900 tracking-tight">Create New Role</h2>
      <p class="text-sm text-gray-500 mt-1">Define a new system role and its permissions</p>
    </div>
  </div>

  <!-- Main Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    
    <!-- Decorative top accent -->
    <div class="h-2 w-full bg-gradient-to-r from-green-400 to-green-600"></div>
    
    <div class="p-8">
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2" for="roleName">
          Role Name
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
            </svg>
          </div>
          <input
            id="roleName"
            [formControl]="roleName"
            placeholder="e.g., Inventory Manager, Delivery Driver..."
            class="pl-10 w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all duration-200 bg-gray-50 text-gray-800 placeholder-gray-400"
          />
        </div>
        <p class="text-xs text-gray-500 mt-2 ml-1">Use a unique, descriptive name for the new role.</p>
      </div>

      <!-- Divider -->
      <div class="border-t border-gray-100 my-8"></div>

      <!-- Action Area -->
      <div class="flex items-center justify-end space-x-4">
        <button 
          (click)="goBack()"
          class="px-6 py-2 rounded-xl border border-gray-200 text-gray-600 font-medium hover:bg-gray-50 hover:text-gray-900 transition-colors">
          Cancel
        </button>
        <button
          (click)="save()"
          [disabled]="!roleName.valid"
          class="px-6 py-2 bg-green-600 text-white font-medium rounded-xl hover:bg-green-700 focus:ring-4 focus:ring-green-200 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex items-center shadow-sm hover:shadow">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 -ml-1" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
          </svg>
          Create Role
        </button>
      </div>
    </div>
  </div>
</div>
