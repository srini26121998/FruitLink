<div class="p-2 max-w-2xl mx-auto flex flex-col gap-2">
  
  <!-- Header Section with Back Button -->
  <div class="flex items-center gap-2 bg-white p-2 rounded shadow-sm border border-gray-100 shrink-0">
    <button 
      (click)="goBack()" 
      class="p-1 rounded hover:bg-gray-100 transition-colors flex items-center justify-center text-gray-600 focus:outline-none border border-transparent hover:border-gray-200"
      title="Go Back">
      <span class="material-symbols-rounded text-[20px]">arrow_back</span>
    </button>
    <div>
      <h2 class="text-base font-medium text-gray-900 m-0">Create New Role</h2>
      <p class="text-xs text-gray-500 mt-0.5 m-0">Define a new system role and its permissions</p>
    </div>
  </div>

  <!-- Main Card -->
  <div class="bg-white rounded shadow-sm border border-gray-100 flex flex-col relative overflow-hidden">
    
    <!-- Decorative top accent -->
    <div class="absolute top-0 left-0 right-0 h-1 bg-green-500"></div>
    
    <div class="p-4 mt-1">
      <div class="mb-4">
        <label class="block text-xs font-medium text-gray-700 mb-1" for="roleName">
          Role Name
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-2.5 flex items-center pointer-events-none">
            <span class="material-symbols-rounded text-gray-400 text-[18px]">badge</span>
          </div>
          <input
            id="roleName"
            [formControl]="roleName"
            placeholder="e.g., Inventory Manager, Delivery Driver..."
            class="pl-8 w-full border border-gray-200 py-1.5 pr-3 rounded focus:ring-1 focus:ring-green-500 focus:border-green-500 outline-none transition-all duration-200 bg-gray-50 text-gray-800 text-xs placeholder-gray-400"
          />
        </div>
        <p class="text-[10px] text-gray-500 mt-1">Use a unique, descriptive name for the new role.</p>
      </div>

      <!-- Action Area -->
      <div class="flex items-center justify-end gap-2 pt-4 border-t border-gray-100">
        <button 
          (click)="goBack()"
          class="px-3 py-1.5 rounded border border-gray-200 text-gray-600 text-xs font-medium hover:bg-gray-50 hover:text-gray-900 transition-colors shadow-sm">
          Cancel
        </button>
        <button
          (click)="save()"
          [disabled]="!roleName.valid"
          class="px-3 py-1.5 bg-green-600 text-white text-xs font-medium rounded hover:bg-green-700 focus:ring-2 focus:ring-green-200 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex items-center shadow-sm hover:shadow">
          <span class="material-symbols-rounded text-[16px] mr-1">check</span>
          Create Role
        </button>
      </div>
    </div>
  </div>
</div>
