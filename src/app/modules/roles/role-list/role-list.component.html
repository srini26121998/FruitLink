<div class="p-6">

  <!-- Page Title -->
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-900">Roles</h2>

    <a routerLink="/roles/create-role"
       class="px-4 py-2 bg-gradient-to-r from-green-600 to-lime-600 text-white rounded-lg shadow hover:shadow-md transition">
      + Create Role
    </a>
  </div>

  <!-- Table Container -->
  <div class="bg-white rounded-xl shadow border border-gray-200 overflow-hidden">

    <table class="w-full">
      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="p-4 text-left text-sm font-semibold text-gray-700 cursor-pointer select-none hover:bg-gray-100 transition" (click)="sortBy('name')">
            Role
            <span *ngIf="sortColumn() === 'name'">
              {{ sortDirection() === 'asc' ? '↑' : '↓' }}
            </span>
          </th>
          <th class="p-4 text-left text-sm font-semibold text-gray-700 cursor-pointer select-none hover:bg-gray-100 transition" (click)="sortBy('permissions')">
            Permissions
            <span *ngIf="sortColumn() === 'permissions'">
              {{ sortDirection() === 'asc' ? '↑' : '↓' }}
            </span>
          </th>
          <th class="p-4 text-right text-sm font-semibold text-gray-700 w-40">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let r of paginatedRoles()"
            class="border-b hover:bg-gray-50 transition group">

          <!-- Role name -->
          <td class="p-4 text-gray-900 font-medium">
            {{ r.name }}
          </td>

          <!-- Permissions badge -->
          <td class="p-4">
            <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-semibold">
              {{ r.permissions.length }} Permissions
            </span>
          </td>

          <!-- Actions -->
          <td class="p-4 text-right">
            <a [routerLink]="['/roles/permission-matrix', r.id]"
               class="px-3 py-1.5 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 transition">
              Manage
            </a>
          </td>

        </tr>
      </tbody>
    </table>

    <!-- Pagination Controls -->
    <div class="p-4 border-t border-gray-200 flex justify-between items-center bg-gray-50">
      <div class="text-sm text-gray-600">
        Showing Page {{ currentPage() }} of {{ totalPages() || 1 }} (Total: {{ sortedRoles().length }})
      </div>
      <div class="flex gap-2">
        <button (click)="prevPage()" [disabled]="currentPage() === 1"
                class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed transition">
          Previous
        </button>
        <button (click)="nextPage()" [disabled]="currentPage() >= totalPages()"
                class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed transition">
          Next
        </button>
      </div>
    </div>

  </div>

</div>
