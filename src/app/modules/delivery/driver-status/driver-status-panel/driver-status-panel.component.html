<div class="p-2">
  <div class="flex items-center justify-between mb-2">
    <div>
      <h2 class="text-base font-medium text-gray-800 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
        Driver Status
      </h2>
      <p class="text-sm text-gray-500 mt-1">Update your current working status</p>
    </div>
    
    <div class="flex items-center gap-2">
      <div class="relative flex h-3 w-3">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"
              [ngClass]="{
                'bg-green-400': currentStatus() === statuses.AVAILABLE,
                'bg-blue-400': currentStatus() === statuses.ON_TRIP,
                'bg-yellow-400': currentStatus() === statuses.ON_BREAK,
                'bg-red-400': currentStatus() === statuses.OFFLINE
              }"></span>
        <span class="relative inline-flex rounded-full h-3 w-3"
              [ngClass]="{
                'bg-green-500': currentStatus() === statuses.AVAILABLE,
                'bg-blue-500': currentStatus() === statuses.ON_TRIP,
                'bg-yellow-500': currentStatus() === statuses.ON_BREAK,
                'bg-red-500': currentStatus() === statuses.OFFLINE
              }"></span>
      </div>
      <span class="px-2.5 py-1 rounded-xl text-[10px] font-semibold uppercase tracking-wider shadow-sm border"
            [ngClass]="{
              'bg-green-50 text-green-700 border-green-200': currentStatus() === statuses.AVAILABLE,
              'bg-blue-50 text-blue-700 border-blue-200': currentStatus() === statuses.ON_TRIP,
              'bg-yellow-50 text-yellow-700 border-yellow-200': currentStatus() === statuses.ON_BREAK,
              'bg-red-50 text-red-700 border-red-200': currentStatus() === statuses.OFFLINE,
              'bg-gray-50 text-gray-700 border-gray-200': !currentStatus()
            }">
        {{ currentStatus() ? currentStatus()!.replace('_', ' ') : 'LOADING...' }}
      </span>
    </div>
  </div>

  <div class="flex flex-col lg:flex-row gap-2 w-full">

    <!-- AVAILABLE -->
    <button
      (click)="updateStatus(statuses.AVAILABLE)"
      class="flex-1 relative flex items-center justify-start p-2 rounded-2xl border bg-white transition-all duration-300 gap-2 group overflow-hidden"
      [ngClass]="currentStatus() === statuses.AVAILABLE ? 'border-green-500 ring-1 ring-green-500 shadow-md scale-[1.02]' : 'border-gray-100 hover:border-green-300 hover:shadow-sm hover:scale-[1.01]'">
      <div class="absolute inset-0 bg-green-50 opacity-0 group-hover:opacity-100 transition-opacity duration-300" [class.opacity-100]="currentStatus() === statuses.AVAILABLE"></div>
      
      <div class="relative w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-300 flex-shrink-0" 
           [ngClass]="currentStatus() === statuses.AVAILABLE ? 'bg-green-500 text-white shadow-lg shadow-green-200' : 'bg-green-100 text-green-600 group-hover:bg-green-500 group-hover:text-white'">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <div class="relative text-left flex-1">
        <span class="block font-semibold text-sm transition-colors" [ngClass]="currentStatus() === statuses.AVAILABLE ? 'text-green-800' : 'text-gray-700 group-hover:text-green-800'">Available</span>
        <span class="block text-[11px] font-normal text-gray-500 mt-0.5" [ngClass]="{'text-green-600': currentStatus() === statuses.AVAILABLE}">Ready for orders</span>
      </div>
      <div class="relative opacity-0 transition-opacity duration-300" [class.opacity-100]="currentStatus() === statuses.AVAILABLE">
        <div class="w-2.5 h-2.5 rounded-full bg-green-500 shadow-sm shadow-green-400"></div>
      </div>
    </button>

    <!-- ON TRIP -->
    <button
      (click)="updateStatus(statuses.ON_TRIP)"
      class="flex-1 relative flex items-center justify-start p-2 rounded-2xl border bg-white transition-all duration-300 gap-2 group overflow-hidden"
      [ngClass]="currentStatus() === statuses.ON_TRIP ? 'border-green-600 ring-1 ring-blue-500 shadow-md scale-[1.02]' : 'border-gray-100 hover:border-blue-300 hover:shadow-sm hover:scale-[1.01]'">
      <div class="absolute inset-0 bg-blue-50 opacity-0 group-hover:opacity-100 transition-opacity duration-300" [class.opacity-100]="currentStatus() === statuses.ON_TRIP"></div>
      
      <div class="relative w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-300 flex-shrink-0" 
           [ngClass]="currentStatus() === statuses.ON_TRIP ? 'bg-blue-500 text-white shadow-lg shadow-blue-200' : 'bg-blue-100 text-blue-600 group-hover:bg-blue-500 group-hover:text-white'">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <div class="relative text-left flex-1">
        <span class="block font-semibold text-sm transition-colors" [ngClass]="currentStatus() === statuses.ON_TRIP ? 'text-blue-800' : 'text-gray-700 group-hover:text-blue-800'">On Trip</span>
        <span class="block text-[11px] font-normal text-gray-500 mt-0.5" [ngClass]="{'text-blue-600': currentStatus() === statuses.ON_TRIP}">Delivering now</span>
      </div>
      <div class="relative opacity-0 transition-opacity duration-300" [class.opacity-100]="currentStatus() === statuses.ON_TRIP">
        <div class="w-2.5 h-2.5 rounded-full bg-blue-500 shadow-sm shadow-blue-400"></div>
      </div>
    </button>

    <!-- ON BREAK -->
    <button
      (click)="updateStatus(statuses.ON_BREAK)"
      class="flex-1 relative flex items-center justify-start p-2 rounded-2xl border bg-white transition-all duration-300 gap-2 group overflow-hidden"
      [ngClass]="currentStatus() === statuses.ON_BREAK ? 'border-yellow-500 ring-1 ring-yellow-500 shadow-md scale-[1.02]' : 'border-gray-100 hover:border-yellow-300 hover:shadow-sm hover:scale-[1.01]'">
      <div class="absolute inset-0 bg-yellow-50 opacity-0 group-hover:opacity-100 transition-opacity duration-300" [class.opacity-100]="currentStatus() === statuses.ON_BREAK"></div>
      
      <div class="relative w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-300 flex-shrink-0" 
           [ngClass]="currentStatus() === statuses.ON_BREAK ? 'bg-yellow-500 text-white shadow-lg shadow-yellow-200' : 'bg-yellow-100 text-yellow-600 group-hover:bg-yellow-500 group-hover:text-white'">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <div class="relative text-left flex-1">
        <span class="block font-semibold text-sm transition-colors" [ngClass]="currentStatus() === statuses.ON_BREAK ? 'text-yellow-800' : 'text-gray-700 group-hover:text-yellow-800'">On Break</span>
        <span class="block text-[11px] font-normal text-gray-500 mt-0.5" [ngClass]="{'text-yellow-600': currentStatus() === statuses.ON_BREAK}">Resting time</span>
      </div>
      <div class="relative opacity-0 transition-opacity duration-300" [class.opacity-100]="currentStatus() === statuses.ON_BREAK">
        <div class="w-2.5 h-2.5 rounded-full bg-yellow-500 shadow-sm shadow-yellow-400"></div>
      </div>
    </button>

    <!-- OFFLINE -->
    <button
      (click)="updateStatus(statuses.OFFLINE)"
      class="flex-1 relative flex items-center justify-start p-2 rounded-2xl border bg-white transition-all duration-300 gap-2 group overflow-hidden"
      [ngClass]="currentStatus() === statuses.OFFLINE ? 'border-red-500 ring-1 ring-red-500 shadow-md scale-[1.02]' : 'border-gray-100 hover:border-red-300 hover:shadow-sm hover:scale-[1.01]'">
      <div class="absolute inset-0 bg-red-50 opacity-0 group-hover:opacity-100 transition-opacity duration-300" [class.opacity-100]="currentStatus() === statuses.OFFLINE"></div>
      
      <div class="relative w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-300 flex-shrink-0" 
           [ngClass]="currentStatus() === statuses.OFFLINE ? 'bg-red-500 text-white shadow-lg shadow-red-200' : 'bg-red-100 text-red-600 group-hover:bg-red-500 group-hover:text-white'">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
        </svg>
      </div>
      <div class="relative text-left flex-1">
        <span class="block font-semibold text-sm transition-colors" [ngClass]="currentStatus() === statuses.OFFLINE ? 'text-red-800' : 'text-gray-700 group-hover:text-red-800'">Offline</span>
        <span class="block text-[11px] font-normal text-gray-500 mt-0.5" [ngClass]="{'text-red-600': currentStatus() === statuses.OFFLINE}">Not working</span>
      </div>
      <div class="relative opacity-0 transition-opacity duration-300" [class.opacity-100]="currentStatus() === statuses.OFFLINE">
        <div class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-sm shadow-red-400"></div>
      </div>
    </button>

  </div>

  <!-- Loading -->
  <div *ngIf="loading()" class="mt-2 flex items-center justify-center gap-2 text-sm font-medium text-gray-500 bg-gray-50 py-2.5 rounded-xl border border-gray-100">
    <svg class="animate-spin h-4 w-4 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    Updating status...
  </div>

  <!-- Error -->
  <div *ngIf="error()" class="mt-2 flex items-center gap-2 text-sm font-medium text-red-600 bg-red-50 p-2 rounded-xl border border-red-100">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    {{ error() }}
  </div>

</div>
