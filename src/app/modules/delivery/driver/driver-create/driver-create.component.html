<div class="p-4 md:p-6 w-full mx-auto">
  <!-- Header -->
  <div class="mb-6 flex items-center gap-4">
    <button (click)="cancel()"
      class="p-2.5 rounded-lg bg-gray-50 border border-gray-200 text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
    </button>
    <div>
      <h2 class="text-xl font-bold text-gray-900 tracking-tight">Register New Driver</h2>
      <p class="text-sm text-gray-500 mt-1 m-0">Add a new driver for order deliveries.</p>
    </div>
  </div>

  <!-- Form Section -->
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
    <form [formGroup]="driverForm" (ngSubmit)="onSubmit()">
      <div class="p-6 space-y-8">

        <!-- Section: Basic Information -->
        <div>
          <h3 class="text-base font-semibold text-gray-900 mb-4 pb-2 border-b border-gray-200">Personal & Vehicle Information</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Full Name <span class="text-red-500">*</span></label>
              <input type="text" formControlName="name" placeholder="e.g. John Doe"
                class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm transition-shadow"
                [class.border-red-300]="driverForm.get('name')?.invalid && driverForm.get('name')?.touched"
                [class.focus:ring-red-500]="driverForm.get('name')?.invalid && driverForm.get('name')?.touched">
              <p *ngIf="driverForm.get('name')?.invalid && driverForm.get('name')?.touched"
                class="text-red-500 text-[10px] mt-1">Name is required (min 3 chars).</p>
            </div>
            
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number <span class="text-red-500">*</span></label>
              <input type="text" formControlName="phone" placeholder="9876543210" maxlength="10"
                class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm transition-shadow"
                [class.border-red-300]="driverForm.get('phone')?.invalid && driverForm.get('phone')?.touched"
                [class.focus:ring-red-500]="driverForm.get('phone')?.invalid && driverForm.get('phone')?.touched">
              <p *ngIf="driverForm.get('phone')?.invalid && driverForm.get('phone')?.touched"
                class="text-red-500 text-[10px] mt-1">Valid 10-digit phone number is required.</p>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Location / Hub <span class="text-red-500">*</span></label>
              <input type="text" formControlName="location" placeholder="e.g. Bangalore Central Hub"
                class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm transition-shadow"
                [class.border-red-300]="driverForm.get('location')?.invalid && driverForm.get('location')?.touched"
                [class.focus:ring-red-500]="driverForm.get('location')?.invalid && driverForm.get('location')?.touched">
              <p *ngIf="driverForm.get('location')?.invalid && driverForm.get('location')?.touched"
                class="text-red-500 text-[10px] mt-1">Location is required (min 3 chars).</p>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Vehicle Number <span class="text-red-500">*</span></label>
              <input type="text" formControlName="vehicleNumber" placeholder="e.g. KA-01-AB-1234"
                class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm transition-shadow uppercase"
                [class.border-red-300]="driverForm.get('vehicleNumber')?.invalid && driverForm.get('vehicleNumber')?.touched"
                [class.focus:ring-red-500]="driverForm.get('vehicleNumber')?.invalid && driverForm.get('vehicleNumber')?.touched">
              <p *ngIf="driverForm.get('vehicleNumber')?.invalid && driverForm.get('vehicleNumber')?.touched"
                class="text-red-500 text-[10px] mt-1">Vehicle number is required (min 4 chars).</p>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Status <span class="text-red-500">*</span></label>
              <select formControlName="status"
                class="animated-dropdown w-full">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
                <option value="On Leave">On Leave</option>
              </select>
            </div>
          </div>
        </div>

      </div>

      <!-- Footer Actions -->
      <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex items-center justify-end gap-3">
        <button type="button" (click)="cancel()" [disabled]="isSubmitting"
          class="px-4 py-2 bg-white border border-gray-300 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50 transition-colors disabled:opacity-50">
          Cancel
        </button>
        <button type="submit" [disabled]="driverForm.invalid || isSubmitting"
          class="px-4 py-2 bg-green-600 border border-transparent text-white text-sm font-medium rounded-lg hover:bg-green-700 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
          <svg *ngIf="isSubmitting" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white"
            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          <span *ngIf="!isSubmitting">Register Driver</span>
          <span *ngIf="isSubmitting">Registering...</span>
        </button>
      </div>
    </form>
  </div>
</div>
