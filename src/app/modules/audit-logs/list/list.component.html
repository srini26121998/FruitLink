<div class="p-6">
  <h2 class="text-2xl font-bold text-primary mb-4">Audit Logs</h2>

  <!-- Search + Filter -->
  <div class="flex gap-3 mb-4">
    <input 
      type="text" 
      placeholder="Search logs..." 
      class="border px-3 py-2 rounded w-full"
      (input)="updateSearch($event)" />

    <select 
      class="border px-3 py-2 rounded"
      (change)="updateFilter($event)">
      <option value="All">All</option>
      <option value="Login">Login</option>
      <option value="Approve Order">Approve Order</option>
      <option value="DB Backup">DB Backup</option>
    </select>
  </div>

  <!-- Logs Table -->
  <div class="bg-white rounded-xl shadow">
    <table class="w-full text-left">
      <thead class="bg-gray-100">
        <tr>
          <th class="px-4 py-2">ID</th>
          <th class="px-4 py-2">User</th>
          <th class="px-4 py-2">Action</th>
          <th class="px-4 py-2">Meta</th>
          <th class="px-4 py-2">Time</th>
          <th class="px-4 py-2">View</th>
        </tr>
      </thead>
      <tbody>

        <tr *ngFor="let l of filteredLogs" class="border-b hover:bg-gray-50">
          <td class="px-4 py-2">{{ l.id }}</td>
          <td class="px-4 py-2">{{ l.user }}</td>
          <td class="px-4 py-2">{{ l.action }}</td>
          <td class="px-4 py-2">{{ l.meta }}</td>
          <td class="px-4 py-2">{{ l.createdAt | date:'medium' }}</td>
          <td class="px-4 py-2">
            <button class="text-primary underline" (click)="openDetails(l.id)">View</button>
          </td>
        </tr>

        <tr *ngIf="filteredLogs.length === 0">
          <td colspan="6" class="px-4 py-6 text-center text-gray-500">
            No logs found.
          </td>
        </tr>

      </tbody>
    </table>
  </div>
</div>
