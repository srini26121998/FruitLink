<div class="p-3 sm:p-4 md:p-6 max-w-4xl mx-auto space-y-4 sm:space-y-6">

  <app-page-header title="Admin Settings"></app-page-header>

  <div class="space-y-4 sm:space-y-6">

    <!-- System Settings -->
    <div class="bg-white p-4 sm:p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow animate-fade-in-up">
      <h3 class="font-semibold text-base sm:text-lg text-gray-800 mb-4 flex items-center gap-2.5">
        <div class="p-2 bg-green-50 rounded-xl">
          <span class="material-symbols-rounded text-green-600" style="font-size:20px;">tune</span>
        </div>
        System Settings
      </h3>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
        <div>
          <label class="form-label">Platform Name</label>
          <input type="text" class="form-input" value="FruitLink" />
        </div>

        <div>
          <label class="form-label">Support Email</label>
          <input type="text" class="form-input" value="support&#64;fruitlink.com" />
        </div>
      </div>
    </div>

    <!-- Notification Settings -->
    <div class="bg-white p-4 sm:p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow animate-fade-in-up delay-100">
      <h3 class="font-semibold text-base sm:text-lg text-gray-800 mb-4 flex items-center gap-2.5">
        <div class="p-2 bg-blue-50 rounded-xl">
          <span class="material-symbols-rounded text-blue-600" style="font-size:20px;">notifications</span>
        </div>
        Notification Settings
      </h3>

      <div class="space-y-3 sm:space-y-4">
        <label class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition-colors cursor-pointer group">
          <div class="relative flex items-center justify-center">
            <input type="checkbox" checked class="peer sr-only" />
            <div class="w-5 h-5 rounded-md border-2 border-gray-300 bg-white peer-checked:bg-green-600 peer-checked:border-green-600 transition-all flex items-center justify-center">
              <svg class="w-3 h-3 text-white hidden peer-checked:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </div>
          <div>
            <span class="text-sm font-medium text-gray-700 group-hover:text-gray-900 transition-colors">Enable Order Alerts</span>
            <p class="text-xs text-gray-400 mt-0.5">Get notified when new orders arrive</p>
          </div>
        </label>

        <label class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition-colors cursor-pointer group">
          <div class="relative flex items-center justify-center">
            <input type="checkbox" checked class="peer sr-only" />
            <div class="w-5 h-5 rounded-md border-2 border-gray-300 bg-white peer-checked:bg-green-600 peer-checked:border-green-600 transition-all flex items-center justify-center">
              <svg class="w-3 h-3 text-white hidden peer-checked:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </div>
          <div>
            <span class="text-sm font-medium text-gray-700 group-hover:text-gray-900 transition-colors">Enable Payment Alerts</span>
            <p class="text-xs text-gray-400 mt-0.5">Receive alerts for payment transactions</p>
          </div>
        </label>

        <label class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition-colors cursor-pointer group">
          <div class="relative flex items-center justify-center">
            <input type="checkbox" class="peer sr-only" />
            <div class="w-5 h-5 rounded-md border-2 border-gray-300 bg-white peer-checked:bg-green-600 peer-checked:border-green-600 transition-all flex items-center justify-center">
              <svg class="w-3 h-3 text-white hidden peer-checked:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          </div>
          <div>
            <span class="text-sm font-medium text-gray-700 group-hover:text-gray-900 transition-colors">Enable Sound Alerts</span>
            <p class="text-xs text-gray-400 mt-0.5">Play sound when notifications arrive</p>
          </div>
        </label>
      </div>
    </div>

    <!-- Save Button -->
    <div class="flex justify-end pt-2">
      <button class="btn-primary">
        <span class="material-symbols-rounded" style="font-size:18px;">save</span>
        Save Settings
      </button>
    </div>

  </div>

</div>
