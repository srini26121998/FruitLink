<div class="p-2">

  <app-page-header title="Admin Settings"></app-page-header>

  <div class="space-y-2">

    <!-- System Settings -->
    <div class="bg-white p-2 rounded-xl shadow">
      <h3 class="font-medium text-base mb-2">System Settings</h3>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
        <div>
          <label class="block text-sm font-semibold">Platform Name</label>
          <input type="text" class="border rounded-lg px-2 py-2 w-full" value="FruitLink" />
        </div>

        <div>
          <label class="block text-sm font-semibold">Support Email</label>
          <input type="text" class="border rounded-lg px-2 py-2 w-full" value="support&#64;fruitlink.com" />
        </div>
      </div>
    </div>

    <!-- Notification Settings -->
    <div class="bg-white p-2 rounded-xl shadow">
      <h3 class="font-medium text-base mb-2">Notification Settings</h3>

      <label class="flex items-center gap-3 mb-2">
        <input type="checkbox" checked class="w-5 h-5" />
        <span>Enable Order Alerts</span>
      </label>

      <label class="flex items-center gap-3 mb-2">
        <input type="checkbox" checked class="w-5 h-5" />
        <span>Enable Payment Alerts</span>
      </label>

      <label class="flex items-center gap-3">
        <input type="checkbox" class="w-5 h-5" />
        <span>Enable Sound Alerts</span>
      </label>
    </div>

  </div>

</div>
