<div class="p-5">

  <h2 class="text-2xl font-bold mb-5">Payments History</h2>

  <!-- Empty State -->
  <div *ngIf="payments.length === 0"
       class="text-center text-gray-500 text-lg">
    No payment records found.
  </div>

  <!-- Payments Table -->
  <div *ngIf="payments.length > 0"
       class="bg-white p-5 rounded-xl shadow overflow-x-auto">

    <table class="w-full border-collapse">
      <thead>
        <tr class="bg-gray-100 text-left">
          <th class="p-3">Txn ID</th>
          <th class="p-3">Amount</th>
          <th class="p-3">Method</th>
          <th class="p-3">Date</th>
          <th class="p-3">Status</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let p of payments" class="border-b">

          <td class="p-3 font-semibold">#{{ p.txnId }}</td>

          <td class="p-3 text-green-600 font-bold">
            ₹ {{ p.amount }}
          </td>

          <td class="p-3">
            <span class="px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-sm">
              {{ p.method }}
            </span>
          </td>

          <td class="p-3">
            {{ p.date | date:'medium' }}
          </td>

          <!-- Status Badge -->
          <td class="p-3">
            <span
              class="px-3 py-1 rounded-full text-sm font-semibold"
              [class.bg-green-100]="p.status == 'Success'"
              [class.text-green-700]="p.status == 'Success'"
              [class.bg-red-100]="p.status == 'Failed'"
              [class.text-red-700]="p.status == 'Failed'"
              [class.bg-yellow-100]="p.status == 'Pending'"
              [class.text-yellow-700]="p.status == 'Pending'"
            >
              {{ p.status }}
            </span>
          </td>

        </tr>
      </tbody>
    </table>

  </div>

</div>
