<h2 class="text-xl font-bold mb-4">Manage Permissions</h2>

<div class="space-y-3">
  <div *ngFor="let p of permissions"
       class="flex items-center gap-3 p-3 border rounded">

    <input
      type="checkbox"
      [checked]="isChecked(p.id)"
      (change)="togglePermission(p.id)"
    />

    <span>{{ p.label }}</span>
  </div>
</div>
