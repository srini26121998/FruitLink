<div class="p-2 max-w-7xl mx-auto flex flex-col gap-2 h-[calc(100vh-80px)]">

  <!-- Header Section -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-2 bg-white p-2 rounded shadow-sm border border-gray-100 shrink-0">
    <div>
      <h2 class="text-base font-medium text-gray-900 m-0">Notification Center</h2>
      <p class="text-xs text-gray-500 mt-0.5 m-0">View and manage your system alerts</p>
    </div>

    <!-- Filter -->
    <div class="flex items-center gap-2">
      <span class="material-symbols-rounded text-gray-400 text-[18px]">filter_list</span>
      <select class="animated-dropdown w-full">
        <option>All</option>
        <option>Unread</option>
        <option>Orders</option>
        <option>Payments</option>
        <option>System</option>
      </select>
    </div>
  </div>

  <!-- Notification Items -->
  <div class="bg-white rounded shadow-sm border border-gray-100 flex-1 flex flex-col min-h-0 overflow-hidden">
    <div class="flex-1 overflow-y-auto p-2">
      <div class="flex flex-col gap-1">
        
        <div class="p-2 border border-gray-100 rounded bg-blue-50/30 hover:bg-white hover:border-blue-200 hover:shadow-sm transition-all cursor-pointer flex gap-3 items-start group">
          <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center shrink-0 mt-0.5">
            <span class="material-symbols-rounded text-[16px]">shopping_cart</span>
          </div>
          <div class="flex-1">
            <div class="flex justify-between items-start mb-0.5">
              <p class="font-medium text-gray-900 text-xs group-hover:text-blue-700 transition-colors m-0">New Order from Juice Hub (ORD-2390)</p>
              <span class="inline-block bg-blue-100 text-blue-700 text-[9px] font-bold px-1.5 py-0.5 rounded border border-blue-200">UNREAD</span>
            </div>
            <p class="text-[10px] text-gray-500 m-0 flex items-center gap-1">
              <span class="material-symbols-rounded text-[12px]">schedule</span> Today • 10:24 AM
            </p>
          </div>
        </div>

        <div class="p-2 border border-transparent rounded hover:bg-gray-50 hover:border-gray-100 transition-all cursor-pointer flex gap-3 items-start group">
          <div class="w-8 h-8 rounded-full bg-green-50 text-green-600 flex items-center justify-center shrink-0 mt-0.5">
            <span class="material-symbols-rounded text-[16px]">payments</span>
          </div>
          <div class="flex-1">
            <p class="font-medium text-gray-800 text-xs group-hover:text-green-700 transition-colors m-0 mb-0.5">Payment Received ₹980</p>
            <p class="text-[10px] text-gray-500 m-0 flex items-center gap-1">
              <span class="material-symbols-rounded text-[12px]">schedule</span> Today • 09:10 AM
            </p>
          </div>
        </div>

        <div class="p-2 border border-transparent rounded hover:bg-gray-50 hover:border-gray-100 transition-all cursor-pointer flex gap-3 items-start group">
          <div class="w-8 h-8 rounded-full bg-orange-50 text-orange-600 flex items-center justify-center shrink-0 mt-0.5">
            <span class="material-symbols-rounded text-[16px]">warning</span>
          </div>
          <div class="flex-1">
            <p class="font-medium text-gray-800 text-xs group-hover:text-orange-700 transition-colors m-0 mb-0.5">Stock Alert — Orange is low stock</p>
            <p class="text-[10px] text-gray-500 m-0 flex items-center gap-1">
              <span class="material-symbols-rounded text-[12px]">schedule</span> Yesterday • 05:32 PM
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
