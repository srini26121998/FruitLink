<div class="px-2 py-2 max-w-7xl mx-auto flex flex-col h-full">

  <div class="mb-2 flex items-center justify-between border-b pb-3 border-gray-100">
    <div class="flex items-center gap-3">
      <div class="bg-green-100 p-2 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <div>
        <h2 class="text-base font-medium text-gray-800 leading-tight">Frequently Asked Questions</h2>
        <p class="text-gray-500 text-xs mt-0.5 font-medium">Quick answers to common questions about your FruitLink experience.</p>
      </div>
    </div>
    
    <div class="hidden sm:block flex items-center gap-2">
      <div class="relative inline-block mr-2">
        <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input 
          type="text" 
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearch()"
          placeholder="Search FAQs..." 
          class="pl-2 pr-2 py-1.5 border border-gray-200 rounded-md focus:outline-none focus:ring-1 focus:ring-green-500 focus:border-green-500 text-xs w-64 transition-shadow bg-gray-50"
        />
      </div>
      <button routerLink="/helpdesk/list" class="bg-green-600 hover:bg-green-700 text-white text-xs px-2 py-1.5 rounded-md font-semibold transition-colors shadow-sm">
        Need More Help?
      </button>
    </div>
  </div>

  <div *ngIf="filteredFaqs.length === 0" class="flex-1 flex flex-col items-center justify-center text-gray-500 bg-gray-50 rounded-lg border border-gray-100 p-4">
    <svg class="w-10 h-10 text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16l2.879-2.879m0 0a3 3 0 104.243-4.242 3 3 0 00-4.243 4.242zM21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    <p class="font-medium text-sm text-gray-600">No FAQs found matching "{{ searchTerm }}"</p>
  </div>

  <div *ngIf="filteredFaqs.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 auto-rows-max">
    <div *ngFor="let f of filteredFaqs" class="bg-white rounded-lg border border-gray-200 hover:border-green-400 hover:shadow-sm transition-all duration-200">
      <details class="group p-3.5">
        <summary class="cursor-pointer text-sm font-semibold text-gray-800 list-none flex justify-between items-start outline-none gap-2">
          <span class="mt-0.5">{{ f.question }}</span>
          <span class="transition-transform duration-300 group-open:rotate-180 text-gray-400 group-hover:text-green-600 shrink-0 mt-0.5">
            <svg fill="none" height="16" shape-rendering="geometricPrecision" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="16"><path d="M6 9l6 6 6-6"></path></svg>
          </span>
        </summary>
        <div class="text-gray-600 mt-2.5 text-xs leading-relaxed border-t border-gray-100 pt-2.5">
          {{ f.answer }}
        </div>
      </details>
    </div>
  </div>

</div>
