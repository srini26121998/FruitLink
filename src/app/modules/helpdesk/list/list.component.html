<div class="p-6 md:p-10 max-w-7xl mx-auto">

  <!-- Header Section -->
  <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
    <div>
      <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Helpdesk</h2>
      <p class="text-gray-500 mt-1 text-sm">Manage your tickets and track issue resolutions</p>
    </div>
    
    <div class="flex items-center gap-3">
      <!-- Search Input -->
      <div class="relative">
        <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input 
          type="text" 
          [(ngModel)]="searchTerm"
          (ngModelChange)="onSearch()"
          placeholder="Search tickets..." 
          class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm w-full md:w-64 transition-shadow bg-gray-50"
        />
      </div>

      <!-- New Ticket Button -->
      <button (click)="openNewTicketModal()" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg text-sm font-semibold transition-colors shadow-sm flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        New Ticket
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="flex space-x-1 bg-gray-100/50 p-1 rounded-lg w-max mb-6 border border-gray-200/60">
    <button 
      *ngFor="let filter of ['All', 'Open', 'Pending', 'Closed']"
      (click)="filterTickets(filter)"
      [class.bg-white]="activeFilter === filter"
      [class.shadow-sm]="activeFilter === filter"
      [class.text-gray-900]="activeFilter === filter"
      [class.font-semibold]="activeFilter === filter"
      [class.text-gray-500]="activeFilter !== filter"
      class="px-4 py-1.5 rounded-md text-sm transition-all duration-200 hover:text-gray-900">
      {{ filter }}
    </button>
  </div>

  <!-- Empty State -->
  <div *ngIf="filteredTickets.length === 0" class="bg-white rounded-2xl border border-gray-100 p-12 text-center shadow-sm">
    <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
    </div>
    <h3 class="text-lg font-medium text-gray-900">No tickets found</h3>
    <p class="text-gray-500 mt-1 text-sm">We couldn't find any tickets matching your criteria.</p>
  </div>

  <!-- Tickets List -->
  <div class="grid grid-cols-1 gap-4" *ngIf="filteredTickets.length > 0">
    <div
      *ngFor="let t of filteredTickets"
      (click)="openTicket(t.id)"
      class="group bg-white rounded-xl border border-gray-200 p-5 cursor-pointer hover:shadow-md hover:border-blue-200 transition-all duration-200 flex flex-col md:flex-row md:items-center justify-between gap-4 relative overflow-hidden"
    >
      <!-- Subtle Status Indicator Stripe -->
      <div class="absolute left-0 top-0 bottom-0 w-1"
        [class.bg-blue-500]="t.status === 'Open'"
        [class.bg-yellow-500]="t.status === 'Pending'"
        [class.bg-green-500]="t.status === 'Resolved' || t.status === 'Closed'">
      </div>

      <div class="flex items-start gap-4">
        <!-- Icon -->
        <div class="hidden md:flex shrink-0 w-10 h-10 rounded-full bg-gray-50 items-center justify-center border border-gray-100 group-hover:bg-blue-50 group-hover:border-blue-100 transition-colors">
          <svg class="w-5 h-5 text-gray-500 group-hover:text-blue-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        </div>
        
        <div>
          <div class="flex items-center gap-3 mb-1">
            <span class="text-xs font-bold text-gray-400 tracking-wider">#{{ t.id }}</span>
            <span class="px-2.5 py-0.5 rounded-md text-[11px] font-semibold tracking-wide uppercase border"
              [class.bg-blue-50]="t.status === 'Open'"
              [class.text-blue-700]="t.status === 'Open'"
              [class.border-blue-200]="t.status === 'Open'"

              [class.bg-yellow-50]="t.status === 'Pending'"
              [class.text-yellow-700]="t.status === 'Pending'"
              [class.border-yellow-200]="t.status === 'Pending'"
              
              [class.bg-green-50]="t.status === 'Resolved' || t.status === 'Closed'"
              [class.text-green-700]="t.status === 'Resolved' || t.status === 'Closed'"
              [class.border-green-200]="t.status === 'Resolved' || t.status === 'Closed'">
              {{ t.status }}
            </span>
          </div>
          <h3 class="text-base font-semibold text-gray-900 group-hover:text-blue-700 transition-colors">{{ t.title }}</h3>
          <p class="text-gray-500 text-sm mt-1 flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Created {{ t.created | date:'mediumDate' }} at {{ t.created | date:'shortTime' }}
          </p>
        </div>
      </div>

      <div class="flex items-center text-green-600 group-hover:text-green-700 transition-colors">
        <span class="text-sm font-medium mr-2 hidden md:block">View Details</span>
        <svg class="w-5 h-5 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      </div>

    </div>
  </div>

  <!-- New Ticket Modal -->
  <div *ngIf="isNewTicketModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden transform transition-all">
      <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
        <h3 class="text-lg font-semibold text-gray-900">Create New Ticket</h3>
        <button (click)="closeNewTicketModal()" class="text-gray-400 hover:text-gray-500 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <div class="p-6">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Ticket Title</label>
          <input type="text" [(ngModel)]="newTicketTitle" placeholder="Briefly describe the issue" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea [(ngModel)]="newTicketDescription" rows="4" placeholder="Provide more details about your issue..." class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm resize-none"></textarea>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
        <button (click)="closeNewTicketModal()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
        <button (click)="submitNewTicket()" [disabled]="!newTicketTitle.trim()" class="px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">Submit Ticket</button>
      </div>
    </div>
  </div>

</div>
