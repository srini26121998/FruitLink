<div class="p-4">

  <h2 class="text-2xl font-bold text-primary mb-6">Delivery Update</h2>

  <div class="bg-white p-6 rounded-xl shadow max-w-xl">

    <div class="space-y-4">

      <div>
        <label class="block font-semibold mb-1">Delivery Status</label>
        <select class="w-full border rounded-lg px-3 py-2">
          <option>Out for Delivery</option>
          <option>Delivered</option>
          <option>Delayed</option>
        </select>
      </div>

      <div>
        <label class="block font-semibold mb-1">Delivery Note</label>
        <textarea 
          rows="3"
          class="w-full border rounded-lg px-3 py-2"
          placeholder="Add a note..."></textarea>
      </div>

      <button class="bg-primary text-white px-4 py-2 rounded-lg">
        Update Delivery
      </button>

    </div>

  </div>

</div>
