<div class="bg-gray-100 p-4 rounded mt-6 w-72 ml-auto">

  <div class="flex justify-between mb-2">
    <span>Subtotal</span> <strong>₹{{subtotal}}</strong>
  </div>

  <div class="flex justify-between mb-2">
    <span>Discount (%)</span>
    <input type="number" class="w-16 p-1 border rounded text-right"
           [value]="discount()"
           (input)="discount.set($any($event.target).valueAsNumber)">
  </div>

  <div class="flex justify-between mb-2">
    <span>GST (5%)</span>
    <span>Included</span>
  </div>

  <div class="flex justify-between text-lg font-bold pt-2 border-t">
    <span>Total</span>
    <span>₹{{total()}}</span>
  </div>
</div>
