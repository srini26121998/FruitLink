<div class="bg-white p-6 rounded-xl shadow text-center">

  <!-- Loading State -->
  <div *ngIf="loading()" class="py-20 text-blue-600 font-semibold text-xl">
    Processing bulk orders…
  </div>

  <!-- Success State -->
  <div *ngIf="success()" class="py-20">

    <div class="text-green-600 text-4xl font-bold mb-4">✓</div>

    <h2 class="text-2xl font-semibold mb-2">Orders Created Successfully!</h2>

    <p class="text-gray-600 mb-4">{{ count() }} bulk orders generated.</p>

    <button class="px-6 py-2 mt-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700"
            (click)="back.emit()">
      Close
    </button>
  </div>

</div>
