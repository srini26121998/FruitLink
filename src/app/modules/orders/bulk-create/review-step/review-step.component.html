<div class="bg-white p-2 rounded-xl shadow">

  <h2 class="text-base font-medium mb-2">Review All Orders</h2>

  <div class="space-y-2 max-h-[65vh] overflow-auto">
    @for (entry of entries(); track entry.shopId) {
      <div class="border rounded-lg p-2 shadow-sm">

        <div class="flex justify-between items-center">
          <h3 class="text-base font-medium">{{ entry.shopName }}</h3>
          <div class="text-gray-500 text-sm">{{ entry.area }}</div>
        </div>

        <table class="mt-2 w-full text-sm border-collapse">
          <thead class="bg-gray-100">
            <tr>
              <th class="p-2 text-left">Item</th>
              <th class="p-2 text-right">Qty</th>
              <th class="p-2 text-right">Price</th>
              <th class="p-2 text-right">Total</th>
            </tr>
          </thead>
          <tbody>
            @for (i of entry.items; track i.productId) {
              <tr class="border-t">
                <td class="p-2">{{ i.name }}</td>
                <td class="p-2 text-right">{{ i.qty }} kg</td>
                <td class="p-2 text-right">₹{{ i.price }}</td>
                <td class="p-2 text-right font-semibold">₹{{ i.total }}</td>
              </tr>
            }
          </tbody>
        </table>

      </div>
    }
  </div>

  <div class="flex justify-between mt-2">
    <button class="px-2 py-2 bg-gray-300 rounded-lg" (click)="back.emit()">Back</button>

    <button class="px-2 py-2 bg-green-600 text-white rounded-lg hover:bg-green-600"
            (click)="next.emit()">
      Confirm Orders
    </button>
  </div>

</div>
