<div class="p-4">

  <h2 class="text-2xl font-bold text-primary mb-6">Orders</h2>

  <!-- Search & Filters -->
  <div class="flex justify-between mb-4">
    <div class="relative w-1/3">
      <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
        <svg class="w-4 h-4 text-gray-500" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
        </svg>
      </div>
      <input
        type="text"
        placeholder="Search orders..."
        class="border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary focus:border-primary block w-full pl-10 p-2.5 outline-none transition-colors"
        [(ngModel)]="searchTerm"
        (input)="currentPage = 1"
      />
    </div>

    <select class="border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary focus:border-primary block p-2.5 outline-none cursor-pointer transition-colors" [(ngModel)]="statusFilter" (change)="currentPage = 1">
      <option value="All">All Statuses</option>
      <option value="Pending">Pending</option>
      <option value="Approved">Approved</option>
      <option value="Delivered">Delivered</option>
    </select>
  </div>

  <!-- Orders Table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm text-left text-gray-500">
        <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b border-gray-200">
          <tr>
            <th scope="col" class="px-6 py-4 cursor-pointer hover:bg-gray-100 transition-colors" (click)="sortBy('id')">
              <div class="flex items-center">
                Order ID
                <span class="ml-1 text-gray-400">
                  <svg *ngIf="sortColumn !== 'id'" class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
                  </svg>
                  <svg *ngIf="sortColumn === 'id' && sortDirection === 'asc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                  </svg>
                  <svg *ngIf="sortColumn === 'id' && sortDirection === 'desc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5 12 21m0 0-7.5-7.5M12 21V3" />
                  </svg>
                </span>
              </div>
            </th>
            <th scope="col" class="px-6 py-4 cursor-pointer hover:bg-gray-100 transition-colors" (click)="sortBy('shop')">
              <div class="flex items-center">
                Shop
                <span class="ml-1 text-gray-400">
                  <svg *ngIf="sortColumn !== 'shop'" class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
                  </svg>
                  <svg *ngIf="sortColumn === 'shop' && sortDirection === 'asc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                  </svg>
                  <svg *ngIf="sortColumn === 'shop' && sortDirection === 'desc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5 12 21m0 0-7.5-7.5M12 21V3" />
                  </svg>
                </span>
              </div>
            </th>
            <th scope="col" class="px-6 py-4 cursor-pointer hover:bg-gray-100 transition-colors" (click)="sortBy('total')">
              <div class="flex items-center">
                Total (₹)
                <span class="ml-1 text-gray-400">
                  <svg *ngIf="sortColumn !== 'total'" class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
                  </svg>
                  <svg *ngIf="sortColumn === 'total' && sortDirection === 'asc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                  </svg>
                  <svg *ngIf="sortColumn === 'total' && sortDirection === 'desc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5 12 21m0 0-7.5-7.5M12 21V3" />
                  </svg>
                </span>
              </div>
            </th>
            <th scope="col" class="px-6 py-4 cursor-pointer hover:bg-gray-100 transition-colors" (click)="sortBy('status')">
              <div class="flex items-center">
                Status
                <span class="ml-1 text-gray-400">
                  <svg *ngIf="sortColumn !== 'status'" class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15 12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9" />
                  </svg>
                  <svg *ngIf="sortColumn === 'status' && sortDirection === 'asc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                  </svg>
                  <svg *ngIf="sortColumn === 'status' && sortDirection === 'desc'" class="w-3 h-3 text-primary" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5 12 21m0 0-7.5-7.5M12 21V3" />
                  </svg>
                </span>
              </div>
            </th>
            <th scope="col" class="px-6 py-4">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="paginatedOrders.length === 0">
            <td colspan="5" class="px-6 py-10 text-center text-gray-500">
              <div class="flex flex-col items-center justify-center">
                <svg class="w-10 h-10 text-gray-300 mb-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                </svg>
                <p class="text-base font-medium">No orders found</p>
                <p class="text-sm">Try adjusting your search or filters.</p>
              </div>
            </td>
          </tr>
          
          <tr *ngFor="let order of paginatedOrders" class="bg-white border-b border-gray-100 hover:bg-gray-50 transition-colors">
            <td class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">{{ order.id }}</td>
            <td class="px-6 py-4">{{ order.shop }}</td>
            <td class="px-6 py-4 font-medium text-gray-900">₹ {{ order.total | number }}</td>
            <td class="px-6 py-4">
              <span [ngClass]="{
                'bg-yellow-100 text-yellow-800 border-yellow-200': order.status === 'Pending',
                'bg-blue-100 text-blue-800 border-blue-200': order.status === 'Approved',
                'bg-green-100 text-green-800 border-green-200': order.status === 'Delivered'
              }" class="px-2.5 py-1 text-xs font-semibold rounded-full border">
                {{ order.status }}
              </span>
            </td>
            <td class="px-6 py-4">
              <a [routerLink]="['/orders/details', order.id]" class="inline-flex items-center justify-center p-2 text-primary bg-primary/10 border border-primary/20 rounded-lg hover:bg-primary hover:text-white transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" title="View Details">
                <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="px-6 py-4 flex items-center justify-between border-t border-gray-100 bg-gray-50" *ngIf="totalPages > 0">
      <div class="text-sm text-gray-500">
        Showing <span class="font-medium text-gray-900">{{ showingStartIndex }}</span> to <span class="font-medium text-gray-900">{{ showingEndIndex }}</span> of <span class="font-medium text-gray-900">{{ filteredOrders.length }}</span> entries
      </div>
      
      <div class="inline-flex rounded-md shadow-sm">
        <button 
          (click)="setPage(currentPage - 1)" 
          [disabled]="currentPage === 1"
          class="px-3 py-2 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-l-lg hover:bg-gray-100 hover:text-gray-700 disabled:opacity-50 disabled:bg-gray-50 disabled:cursor-not-allowed transition-colors">
          Previous
        </button>
        
        <button 
          *ngFor="let page of pages" 
          (click)="setPage(page)"
          [ngClass]="{
            'z-10 text-primary bg-primary/10 border-primary': currentPage === page,
            'text-gray-500 bg-white border-gray-300 hover:bg-gray-100 hover:text-gray-700': currentPage !== page
          }"
          class="px-3 py-2 text-sm font-medium border-t border-b transition-colors -ml-px first:ml-0">
          {{ page }}
        </button>

        <button 
          (click)="setPage(currentPage + 1)" 
          [disabled]="currentPage === totalPages"
          class="px-3 py-2 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-r-lg hover:bg-gray-100 hover:text-gray-700 disabled:opacity-50 disabled:bg-gray-50 disabled:cursor-not-allowed transition-colors -ml-px">
          Next
        </button>
      </div>
    </div>
  </div>

</div>
