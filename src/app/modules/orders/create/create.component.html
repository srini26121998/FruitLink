<div class="p-6 md:p-8 max-w-6xl mx-auto space-y-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Create Order</h1>
      <p class="text-sm text-gray-500">Fill in the details to create a new order</p>
    </div>
    <button class="px-4 py-1.5 bg-white border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50">
      Import Data
    </button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Customer Details -->
    <div class="lg:col-span-1 space-y-4 bg-white p-5 rounded-lg shadow-sm border border-gray-200 h-fit">
      <h2 class="text-lg font-semibold text-gray-900 border-b pb-3 mb-4">Customer Details</h2>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" [(ngModel)]="customer.name" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 sm:text-sm p-2 border" placeholder="Enter full name">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contact Number</label>
        <input type="text" [(ngModel)]="customer.phone" (keypress)="allowOnlyNumbers($event)" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 sm:text-sm p-2 border" placeholder="Enter phone number">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Delivery Address</label>
        <textarea [(ngModel)]="customer.address" rows="3" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 sm:text-sm p-2 border" placeholder="Enter delivery address"></textarea>
      </div>
    </div>

    <!-- Order Items -->
    <div class="lg:col-span-2 space-y-4 bg-white p-5 rounded-lg shadow-sm border border-gray-200">
      <div class="flex items-center justify-between border-b pb-3 mb-4">
        <h2 class="text-lg font-semibold text-gray-900">Order Items</h2>
        <button (click)="addItem()" class="px-3 py-1 bg-gray-100 text-gray-700 rounded-md text-sm font-medium hover:bg-gray-200 flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Add Product
        </button>
      </div>

      <div class="space-y-4">
        <div *ngFor="let item of items; let i = index" class="flex flex-col sm:flex-row items-end gap-3 p-4 bg-gray-50 border border-gray-200 rounded-md">
          
          <div class="flex-1 w-full">
            <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wider">Product</label>
            <select [(ngModel)]="item.fruit" (change)="updatePrice(i)" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 sm:text-sm p-2 border bg-white">
              <option value="" disabled selected>Select product...</option>
              <option *ngFor="let f of fruits" [value]="f.name">{{ f.name }}</option>
            </select>
          </div>

          <div class="w-full sm:w-24">
            <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wider">Qty</label>
            <input type="number" [(ngModel)]="item.quantity" (input)="updateTotal(i)" min="1" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-green-500 focus:border-green-500 sm:text-sm p-2 border">
          </div>

          <div class="w-full sm:w-28">
            <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wider">Rate (₹)</label>
            <input type="number" [(ngModel)]="item.price" readonly class="w-full border-gray-300 rounded-md shadow-sm bg-gray-100 sm:text-sm p-2 border text-gray-600">
          </div>

          <div class="w-full sm:w-28">
            <label class="block text-xs font-semibold text-gray-600 mb-1 uppercase tracking-wider">Total (₹)</label>
            <div class="font-bold text-gray-900 p-2 text-base">₹{{ item.total }}</div>
          </div>

          <button (click)="removeItem(i)" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-md transition-colors" title="Remove item">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </div>
      </div>
      
      <div *ngIf="items.length === 0" class="text-center py-8 text-gray-500 text-sm border-2 border-dashed border-gray-200 rounded-md">
        Your cart is empty. Add a product to get started.
      </div>

      <div class="mt-8 pt-4 border-t flex flex-col sm:flex-row items-center justify-between gap-4">
        <div>
          <span class="block text-sm font-medium text-gray-500">Total Amount</span>
          <span class="text-2xl font-bold text-gray-900">₹{{ orderTotal }}</span>
        </div>
        <button (click)="submitOrder()" class="w-full sm:w-auto px-6 py-1.5 bg-green-600 text-white rounded-md shadow-sm hover:bg-green-700 font-medium transition-colors focus:ring-4 focus:ring-green-100">
          Confirm Order
        </button>
      </div>
    </div>
  </div>
</div>
