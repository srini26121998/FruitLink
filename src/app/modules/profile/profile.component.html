<div class="p-3 sm:p-4 md:p-6 bg-gray-50 min-h-screen">

  <app-page-header title="My Profile"></app-page-header>

  <div class="bg-white p-4 sm:p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100 max-w-5xl mx-auto mt-4 animate-fade-in-up">

    <div class="flex flex-col md:flex-row gap-6 md:gap-8">
      <!-- LEFT SIDE: PROFILE UPLOAD -->
      <div class="w-full md:w-1/3 flex flex-col items-center">
        <app-change-photo></app-change-photo>
      </div>

      <!-- RIGHT SIDE: PROFILE FORM -->
      <div class="w-full md:w-2/3 space-y-6 sm:space-y-8">
        <div>
          <h3 class="text-base sm:text-lg font-bold text-gray-800 mb-3 sm:mb-4 border-b pb-2 flex items-center gap-2">
            <span class="material-symbols-rounded text-green-600" style="font-size:20px;">business</span>
            Business Information
          </h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
            <div>
              <label class="form-label">Shop Name</label>
              <input type="text" value="FruitLink B2B" class="form-input shadow-sm hover:shadow-md transition-shadow" />
            </div>

            <div>
              <label class="form-label">Shop Email ID</label>
              <input type="email" value="admin@fruitlink.com" class="form-input shadow-sm hover:shadow-md transition-shadow" />
            </div>

            <div>
              <label class="form-label">Mobile Number</label>
              <input type="text" value="9094881471" class="form-input shadow-sm hover:shadow-md transition-shadow" />
            </div>
            
            <div class="sm:col-span-2">
              <label class="form-label">Address</label>
              <textarea rows="2" class="form-input shadow-sm hover:shadow-md transition-shadow resize-none">123 Market Street, Downtown</textarea>
            </div>
          </div>
        </div>

        <div>
          <h3 class="text-base sm:text-lg font-bold text-gray-800 mb-3 sm:mb-4 border-b pb-2 flex items-center gap-2">
            <span class="material-symbols-rounded text-green-600" style="font-size:20px;">lock</span>
            Account Credentials
          </h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
            <div>
              <label class="form-label">Username</label>
              <input type="text" value="admin_user" class="form-input shadow-sm bg-gray-50" />
            </div>

            <div>
              <label class="form-label">New Password</label>
              <input type="password" placeholder="Enter new password" class="form-input shadow-sm hover:shadow-md transition-shadow" />
              <span class="text-xs text-gray-500 mt-1 block">Leave blank to keep current password</span>
            </div>

            <div>
              <label class="form-label">Confirm Password</label>
              <input type="password" placeholder="Confirm new password" class="form-input shadow-sm hover:shadow-md transition-shadow" />
            </div>
          </div>
        </div>

        <div class="flex flex-col-reverse sm:flex-row items-stretch sm:items-center justify-end gap-2 sm:gap-3 pt-4 border-t border-gray-100">
          <button class="btn-secondary">
            Cancel
          </button>
          <button class="btn-primary">
            <span class="material-symbols-rounded" style="font-size:18px;">save</span>
            Save Changes
          </button>
        </div>

      </div>
    </div>

  </div>

  <!-- PASSWORD MODAL -->
  <app-change-password 
    *ngIf="showPasswordModal"
    (close)="closeChangePassword()">
  </app-change-password>

</div>
