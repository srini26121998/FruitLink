<div *ngIf="showWarning"
     class="fixed inset-0 flex items-center justify-center bg-black/50 z-[99999]">

  <div class="bg-white p-2 rounded-xl shadow-xl text-center w-80">
    <h2 class="font-medium text-base mb-2">Are you still there?</h2>
    <p class="text-gray-600 mb-2">
      You will be logged out due to inactivity in <span class="font-bold">{{ counter }}</span> seconds.
    </p>

    <button class="bg-green-600 text-white px-2 py-2 rounded-lg"
            (click)="stayLoggedIn()">
      I’m Active
    </button>
  </div>

</div>
