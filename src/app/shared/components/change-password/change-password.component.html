<div class="max-w-md mx-auto bg-white p-2 rounded-lg shadow space-y-2">
  <h2 class="text-base font-medium">Change Password</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-2">
    <!-- current password -->
    <div>
      <label class="block text-sm text-gray-600 mb-1">Current Password</label>
      <input type="password" formControlName="currentPassword"
             class="w-full border rounded px-3 py-2 focus:outline-none focus:ring"
             [class.border-red-400]="currentPassword?.invalid && currentPassword?.touched" />
      <p *ngIf="currentPassword?.touched && currentPassword?.hasError('required')" class="text-red-500 text-sm mt-1">Current password is required.</p>
      <p *ngIf="currentPassword?.touched && currentPassword?.hasError('minlength')" class="text-red-500 text-sm mt-1">Minimum 6 characters.</p>
    </div>

    <!-- new password -->
    <div>
      <label class="block text-sm text-gray-600 mb-1">New Password</label>
      <input type="password" formControlName="newPassword"
             class="w-full border rounded px-3 py-2 focus:outline-none focus:ring"
             [class.border-red-400]="newPassword?.invalid && newPassword?.touched" />
      <p *ngIf="newPassword?.touched && newPassword?.hasError('required')" class="text-red-500 text-sm mt-1">New password is required.</p>
      <p *ngIf="newPassword?.touched && newPassword?.hasError('minlength')" class="text-red-500 text-sm mt-1">Minimum 8 characters.</p>
    </div>

    <!-- confirm password -->
    <div>
      <label class="block text-sm text-gray-600 mb-1">Confirm Password</label>
      <input type="password" formControlName="confirmPassword"
             class="w-full border rounded px-3 py-2 focus:outline-none focus:ring"
             [class.border-red-400]="(confirmPassword?.invalid && confirmPassword?.touched) || (form.hasError('passwordsMismatch') && confirmPassword?.touched)" />
      <p *ngIf="confirmPassword?.touched && confirmPassword?.hasError('required')" class="text-red-500 text-sm mt-1">Please confirm new password.</p>
      <p *ngIf="form.hasError('passwordsMismatch') && confirmPassword?.touched" class="text-red-500 text-sm mt-1">Passwords do not match.</p>
    </div>

    <!-- messages -->
    <div *ngIf="errorMessage" class="text-red-600 text-sm">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="text-green-600 text-sm">{{ successMessage }}</div>

    <!-- actions -->
    <div class="flex items-center gap-3">
      <button type="submit" [disabled]="loading"
              class="bg-green-600 text-white px-2 py-2 rounded disabled:opacity-60">
        <span *ngIf="!loading">Change Password</span>
        <span *ngIf="loading">Saving...</span>
      </button>

      <button type="button" (click)="form.reset()" class="text-gray-600 px-3 py-2 rounded border">Reset</button>
    </div>
  </form>
</div>
