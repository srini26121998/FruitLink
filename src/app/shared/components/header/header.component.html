<header class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-b border-gray-100 shadow-sm h-[72px] flex justify-between items-center px-4 md:px-8 z-30 transition-all duration-300">

  <!-- LEFT / BRANDING & MENU -->
  <div class="flex items-center gap-4">
    <button class="lg:hidden p-2.5 bg-gray-50 hover:bg-green-50 text-gray-600 hover:text-green-600 rounded-xl transition-colors duration-200" (click)="toggleSidebarMobile($event)">
      <span class="material-icons text-xl leading-none">menu</span>
    </button>

    <div class="flex items-center gap-2 lg:hidden">
       <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center text-white shadow-md shadow-green-200">
         <span class="material-icons text-[18px]">local_florist</span>
       </div>
       <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-green-700 to-green-500 tracking-tight">FruitLink</h1>
    </div>
  </div>

  <!-- RIGHT / ACTIONS & PROFILE -->
  <div class="flex items-center gap-3 sm:gap-5 ml-auto">
    
    <!-- CART -->
    <button class="relative p-2.5 rounded-xl bg-gray-50 hover:bg-green-50 text-gray-600 hover:text-green-600 transition-colors duration-200 group">
      <span class="material-icons text-[22px] leading-none group-hover:scale-110 transition-transform duration-200">shopping_cart</span>
      <span *ngIf="cart.cart().length > 0" 
            class="absolute -top-1.5 -right-1.5 bg-gradient-to-r from-red-500 to-pink-500 text-white text-[10px] font-bold px-1.5 py-0.5 min-w-[20px] h-[20px] flex items-center justify-center rounded-full shadow-sm shadow-red-200 border-2 border-white animate-fade">
        {{ cart.cart().length }}
      </span>
    </button>

    <!-- NOTIFICATION (Mocked for visual balance) -->
    <button class="relative p-2.5 rounded-xl bg-gray-50 hover:bg-green-50 text-gray-600 hover:text-green-600 transition-colors duration-200 group hidden sm:block">
      <span class="material-icons text-[22px] leading-none group-hover:scale-110 transition-transform duration-200">notifications_none</span>
      <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
    </button>

    <!-- DIVIDER -->
    <div class="w-px h-8 bg-gray-200 hidden sm:block mx-1"></div>

    <!-- USER PROFILE -->
    <div class="relative">
      <div 
        class="flex items-center gap-3 cursor-pointer p-1.5 pr-3 rounded-full hover:bg-gray-50 border border-transparent hover:border-gray-100 transition-all duration-200"
        (click)="toggleUserMenu($event)"
      >
        <div class="relative">
          <img
            src="https://ui-avatars.com/api/?name={{ user?.name || 'G' }}&background=E8F5E9&color=2E7D32&bold=true"
            class="w-10 h-10 rounded-full object-cover shadow-sm ring-2 ring-white"
            alt="User Avatar"
          />
          <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
        </div>
        <div class="hidden md:block text-left">
           <p class="text-sm font-semibold text-gray-800 leading-tight">{{ user?.name || 'Guest' }}</p>
           <p class="text-[11px] text-gray-500 capitalize font-medium tracking-wide">{{ user?.role || 'Visitor' }}</p>
        </div>
        <span class="material-icons text-gray-400 text-[18px] hidden md:block transition-transform duration-300" [class.rotate-180]="showUserMenu()">expand_more</span>
      </div>

      <!-- DROPDOWN -->
      <div *ngIf="showUserMenu()" class="absolute right-0 mt-3 w-64 bg-white/95 backdrop-blur-2xl shadow-[0_15px_40px_-10px_rgba(0,0,0,0.1)] border border-gray-100 rounded-2xl z-50 animate-fade overflow-hidden">
        
        <div class="px-5 py-4 bg-gradient-to-br from-green-50 to-white border-b border-gray-100">
          <p class="font-semibold text-gray-900">{{ user?.name || 'Guest User' }}</p>
          <p class="text-xs text-green-600 font-semibold capitalize mt-1">{{ user?.role || 'Guest' }} Account</p>
        </div>

        <div class="p-2">
          <button class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-green-50 hover:text-green-700 transition-all flex items-center gap-3 group">
            <span class="material-icons text-gray-400 group-hover:text-green-600 text-[20px] transition-colors">person_outline</span> 
            My Profile
          </button>
          <button class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-green-50 hover:text-green-700 transition-all flex items-center gap-3 group mt-1">
            <span class="material-icons text-gray-400 group-hover:text-green-600 text-[20px] transition-colors">settings_input_component</span> 
            Preferences
          </button>
        </div>

        <div class="p-2 border-t border-gray-100 bg-gray-50/50">
          <button (click)="logout()" class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-medium text-red-600 hover:bg-red-50 hover:text-red-700 transition-all flex items-center gap-3 group">
            <span class="material-icons text-red-400 group-hover:text-red-600 text-[20px] transition-colors">logout</span> 
            Sign Out
          </button>
        </div>
      </div>
    </div>

  </div>

</header>
