<header class="bg-white/90 backdrop-blur-xl border-b border-gray-100/80 shadow-sm h-14 sm:h-16 flex justify-between items-center px-3 sm:px-4 md:px-5 z-30 transition-all duration-300">

  <!-- LEFT / BRANDING & MENU -->
  <div class="flex items-center gap-2 sm:gap-3 min-w-0">
    <button class="lg:hidden p-2 bg-gray-50 hover:bg-green-50 text-gray-500 hover:text-green-600 rounded-xl transition-colors duration-200 flex-shrink-0 active:scale-95" (click)="toggleSidebarMobile($event)">
      <span class="material-symbols-rounded" style="font-size:22px;">menu</span>
    </button>

    <div class="flex items-center gap-2 lg:hidden min-w-0">
       <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center text-white shadow-md shadow-green-200 flex-shrink-0">
         <span class="material-symbols-rounded filled text-white" style="font-size:18px;">nutrition</span>
       </div>
       <h1 class="text-base font-semibold bg-clip-text text-transparent bg-gradient-to-r from-green-700 to-green-500 tracking-tight truncate">FruitLink</h1>
    </div>
  </div>

  <!-- RIGHT / ACTIONS & PROFILE -->
  <div class="flex items-center gap-1.5 sm:gap-2.5 ml-auto flex-shrink-0">
    
    <!-- CART -->
    <button class="relative p-2 rounded-xl bg-gray-50 hover:bg-green-50 text-gray-500 hover:text-green-600 transition-all duration-200 group active:scale-95">
      <span class="material-symbols-rounded group-hover:scale-110 transition-transform duration-200" style="font-size:20px;">shopping_cart</span>
      <span *ngIf="cart.cart().length > 0" 
            class="absolute -top-1 -right-1 bg-gradient-to-r from-red-500 to-pink-500 text-white text-[10px] font-bold px-1.5 py-0.5 min-w-[18px] h-[18px] flex items-center justify-center rounded-full shadow-sm border-2 border-white">
        {{ cart.cart().length }}
      </span>
    </button>

    <!-- NOTIFICATION -->
    <button class="relative p-2 rounded-xl bg-gray-50 hover:bg-green-50 text-gray-500 hover:text-green-600 transition-all duration-200 group hidden sm:flex items-center justify-center active:scale-95">
      <span class="material-symbols-rounded group-hover:scale-110 transition-transform duration-200" style="font-size:20px;">notifications</span>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
    </button>

    <!-- DIVIDER -->
    <div class="w-px h-7 bg-gray-200 hidden sm:block mx-0.5"></div>

    <!-- USER PROFILE -->
    <div class="relative">
      <div 
        class="flex items-center gap-2 cursor-pointer p-1 sm:p-1.5 sm:pr-3 rounded-full hover:bg-gray-50 border border-transparent hover:border-gray-100 transition-all duration-200 active:scale-[0.97]"
        (click)="toggleUserMenu($event)"
      >
        <div class="relative">
          <img
            src="https://ui-avatars.com/api/?name={{ user?.name || 'G' }}&background=E8F5E9&color=2E7D32&bold=true"
            class="w-8 h-8 sm:w-9 sm:h-9 rounded-full object-cover shadow-sm ring-2 ring-white"
            alt="User Avatar"
          />
          <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-white rounded-full"></div>
        </div>
        <div class="hidden md:block text-left min-w-0">
           <p class="text-sm font-semibold text-gray-800 leading-tight truncate max-w-[120px]">{{ user?.name || 'Guest' }}</p>
           <p class="text-[11px] text-gray-500 capitalize font-medium tracking-wide truncate">{{ user?.role || 'Visitor' }}</p>
        </div>
        <span class="material-symbols-rounded text-gray-400 hidden md:block transition-transform duration-300" style="font-size:18px;" [class.rotate-180]="showUserMenu()">expand_more</span>
      </div>

      <!-- DROPDOWN -->
      <div *ngIf="showUserMenu()" class="absolute right-0 mt-2 w-56 sm:w-64 bg-white/95 backdrop-blur-2xl shadow-[0_15px_40px_-10px_rgba(0,0,0,0.12)] border border-gray-100 rounded-2xl z-50 animate-scale-in overflow-hidden">
        
        <div class="px-4 py-3 bg-gradient-to-br from-green-50 to-white border-b border-gray-100">
          <p class="font-semibold text-gray-900 text-sm">{{ user?.name || 'Guest User' }}</p>
          <p class="text-xs text-green-600 font-semibold capitalize mt-0.5">{{ user?.role || 'Guest' }} Account</p>
        </div>

        <div class="p-1.5">
          <button class="w-full text-left px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-green-50 hover:text-green-700 transition-all flex items-center gap-3 group active:scale-[0.98]">
            <span class="material-symbols-rounded text-gray-400 group-hover:text-green-600 transition-colors" style="font-size:20px;">person</span> 
            My Profile
          </button>
          <button class="w-full text-left px-3 py-2.5 rounded-xl text-sm font-medium text-gray-600 hover:bg-green-50 hover:text-green-700 transition-all flex items-center gap-3 group mt-0.5 active:scale-[0.98]">
            <span class="material-symbols-rounded text-gray-400 group-hover:text-green-600 transition-colors" style="font-size:20px;">settings</span> 
            Preferences
          </button>
        </div>

        <div class="p-1.5 border-t border-gray-100 bg-gray-50/50">
          <button (click)="logout()" class="w-full text-left px-3 py-2.5 rounded-xl text-sm font-medium text-red-600 hover:bg-red-50 hover:text-red-700 transition-all flex items-center gap-3 group active:scale-[0.98]">
            <span class="material-symbols-rounded text-red-400 group-hover:text-red-600 transition-colors" style="font-size:20px;">logout</span> 
            Sign Out
          </button>
        </div>
      </div>
    </div>

  </div>

</header>
