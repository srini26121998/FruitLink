<!-- MOBILE BACKDROP -->
<div
  class="fixed inset-0 bg-black/40 z-30 lg:hidden"
  *ngIf="!sidebar.collapsed() && sidebar.isMobile()"
  (click)="sidebar.toggleSidebar()">
</div>

<!-- SIDEBAR -->
<aside
  class="fixed top-0 left-0 h-full bg-white shadow-lg z-40 transition-all duration-300 ease-in-out
         flex flex-col border-r overflow-x-hidden"
  [class.w-64]="!sidebar.collapsed()"
  [class.w-20]="sidebar.collapsed()"
  [class.-translate-x-full]="sidebar.isMobile() && sidebar.collapsed()"
  [class.translate-x-0]="sidebar.isMobile() && !sidebar.collapsed()">

  <!-- HEADER -->
  <div class="h-16 flex items-center px-4 border-b transition-all duration-300"
       [class.justify-center]="sidebar.collapsed()"
       [class.justify-between]="!sidebar.collapsed()">

    <div class="flex items-center gap-3 cursor-pointer overflow-hidden" (click)="sidebar.toggleSidebar()">
      <span class="text-3xl shrink-0">🍏</span>

      <span class="font-bold text-lg transition-all duration-200 whitespace-nowrap"
            [class.hidden]="sidebar.collapsed()">
        FruitLink
      </span>
    </div>

    <button
      *ngIf="!sidebar.collapsed()"
      class="p-2 rounded hover:bg-secondary/20 transition shrink-0"
      (click)="sidebar.toggleSidebar()">
      <span class="material-icons text-gray-700">menu</span>
    </button>
  </div>

  <!-- MENU -->
  <nav class="flex-1 overflow-y-auto py-4 px-2">
    <ul class="space-y-1">

      <li *ngFor="let item of menu()">

        <!-- GROUP ITEM -->
        <div
          class="flex items-center justify-between px-4 py-2 rounded-lg cursor-pointer
                 hover:bg-secondary/10 transition-all duration-150"
          [class.bg-primary]="isActive(item.link)"
          [class.bg-opacity-10]="isActive(item.link)"
          [class.text-primary]="isActive(item.link)"
          (click)="handleItemClick(item)">

          <!-- ICON + LABEL -->
          <div class="flex items-center gap-3">

            <span class="material-icons text-primary text-xl">
              {{ item.icon }}
            </span>

            <span
              class="text-sm font-medium transition-opacity duration-200 whitespace-nowrap"
              [class.opacity-0]="sidebar.collapsed()">
              {{ item.label }}
            </span>
          </div>

          <!-- ARROW -->
          <span
            *ngIf="item.children && !sidebar.collapsed()"
            class="material-icons text-gray-500 text-sm">
            {{ open()[item.id] ? 'expand_less' : 'expand_more' }}
          </span>

        </div>

        <!-- CHILDREN -->
        <ul
          *ngIf="item.children && open()[item.id] && !sidebar.collapsed()"
          class="pl-12 pr-4 space-y-1 overflow-hidden animate-[fadeIn_0.2s_ease]">

          <li *ngFor="let child of item.children">
            <a
              [routerLink]="child.link"
              routerLinkActive="bg-primary/10 text-primary font-semibold"
              class="block px-3 py-2 rounded-md hover:bg-secondary/10 text-sm transition-all duration-150 whitespace-nowrap">
              {{ child.label }}
            </a>
          </li>

        </ul>

      </li>
    </ul>
  </nav>

  <!-- FOOTER -->
  <div
    class="p-4 border-t flex items-center gap-3 cursor-pointer hover:bg-red-50 rounded-lg mx-2"
    (click)="logout()">

    <span class="material-icons text-red-600">logout</span>

    <span
      class="text-sm text-red-600 whitespace-nowrap transition-opacity duration-200"
      [class.opacity-0]="sidebar.collapsed()">
      Logout
    </span>
  </div>

</aside>
