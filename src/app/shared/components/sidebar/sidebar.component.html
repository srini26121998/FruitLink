<!-- MOBILE BACKDROP -->
<div
  class="fixed inset-0 bg-black/40 z-30 lg:hidden"
  *ngIf="!sidebar.collapsed() && sidebar.isMobile()"
  (click)="sidebar.toggleSidebar()">
</div>

<!-- SIDEBAR -->
<aside
  class="fixed top-0 left-0 h-full bg-white shadow-lg z-40 transition-all duration-300 ease-in-out
         flex flex-col border-r border-gray-100/80 overflow-x-hidden"
  [class.w-64]="!sidebar.collapsed()"
  [class.w-[72px]]="sidebar.collapsed()"
  [class.-translate-x-full]="sidebar.isMobile() && sidebar.collapsed()"
  [class.translate-x-0]="sidebar.isMobile() && !sidebar.collapsed()">

  <!-- HEADER -->
  <div class="h-16 flex items-center px-2 border-b border-gray-100 transition-all duration-300"
       [class.justify-center]="sidebar.collapsed()"
       [class.justify-between]="!sidebar.collapsed()">

    <div class="flex items-center gap-3 cursor-pointer overflow-hidden" (click)="sidebar.toggleSidebar()">
      <!-- Logo mark -->
      <div class="w-8 h-8 shrink-0 rounded-lg bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center shadow-md shadow-green-200">
        <span class="material-symbols-rounded filled text-white" style="font-size:18px;">nutrition</span>
      </div>

      <span class="font-bold text-lg tracking-tight bg-gradient-to-r from-green-700 to-green-500 bg-clip-text text-transparent transition-all duration-200 whitespace-nowrap"
            [class.hidden]="sidebar.collapsed()">
        FruitLink
      </span>
    </div>

    <button
      *ngIf="!sidebar.collapsed()"
      class="p-1.5 rounded-lg hover:bg-gray-100 transition-colors duration-150 shrink-0"
      (click)="sidebar.toggleSidebar()">
      <span class="material-symbols-rounded text-gray-500" style="font-size:20px;">menu_open</span>
    </button>
  </div>

  <!-- MENU -->
  <nav class="flex-1 overflow-y-auto py-3 px-2 scrollbar-hide">
    <ul class="space-y-0.5">

      <li *ngFor="let item of menu()">

        <!-- GROUP ITEM -->
        <div
          class="flex items-center justify-between px-2 py-2 rounded-xl cursor-pointer
                 transition-all duration-150 group relative"
          [class.bg-green-50]="isActive(item.link)"
          [class.text-green-700]="isActive(item.link)"
          [class.hover:bg-gray-50]="!isActive(item.link)"
          (click)="handleItemClick(item)"
          [title]="sidebar.collapsed() ? item.label : ''">

          <!-- ICON + LABEL -->
          <div class="flex items-center gap-3 min-w-0">

            <!-- ICON PILL -->
            <div class="shrink-0 w-8 h-8 flex items-center justify-center rounded-lg transition-all duration-150"
                 [class.bg-green-500]="isActive(item.link)"
                 [class.shadow-sm]="isActive(item.link)"
                 [class.shadow-green-200]="isActive(item.link)"
                 [class.bg-gray-100]="!isActive(item.link)"
                 [class.group-hover:bg-gray-200]="!isActive(item.link)">
              <span class="material-symbols-rounded transition-all duration-150"
                    [class.filled]="isActive(item.link)"
                    [class.text-white]="isActive(item.link)"
                    [class.text-gray-500]="!isActive(item.link)"
                    [class.group-hover:text-gray-700]="!isActive(item.link)"
                    style="font-size:18px;">
                {{ item.icon }}
              </span>
            </div>

            <span
              class="text-sm font-medium transition-all duration-200 whitespace-nowrap truncate"
              [class.opacity-0]="sidebar.collapsed()"
              [class.w-0]="sidebar.collapsed()"
              [class.text-green-700]="isActive(item.link)"
              [class.text-gray-600]="!isActive(item.link)">
              {{ item.label }}
            </span>
          </div>

          <!-- ARROW -->
          <span
            *ngIf="item.children && !sidebar.collapsed()"
            class="material-symbols-rounded text-gray-400 shrink-0 transition-transform duration-200"
            style="font-size:16px;"
            [class.rotate-180]="open()[item.id]">
            expand_more
          </span>

        </div>

        <!-- CHILDREN -->
        <ul
          *ngIf="item.children && open()[item.id] && !sidebar.collapsed()"
          class="ml-2 pl-3 mt-0.5 space-y-0.5 border-l-2 border-gray-100 overflow-hidden animate-[fadeIn_0.2s_ease]">

          <li *ngFor="let child of item.children">
            <a
              [routerLink]="child.link"
              routerLinkActive="bg-green-50 text-green-700 font-semibold"
              class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm text-gray-500 hover:bg-gray-50 hover:text-gray-700 transition-all duration-150 whitespace-nowrap">
              <span class="material-symbols-rounded text-gray-400 shrink-0" style="font-size:15px;">{{ child.icon }}</span>
              {{ child.label }}
            </a>
          </li>

        </ul>

      </li>
    </ul>
  </nav>

  <!-- FOOTER / LOGOUT -->
  <div class="p-2 border-t border-gray-100">
    <div
      class="flex items-center gap-3 px-2 py-2 rounded-xl cursor-pointer hover:bg-red-50 transition-all duration-150 group"
      (click)="logout()"
      [title]="sidebar.collapsed() ? 'Logout' : ''">

      <div class="shrink-0 w-8 h-8 flex items-center justify-center rounded-lg bg-red-50 group-hover:bg-red-100 transition-colors duration-150">
        <span class="material-symbols-rounded text-red-500 group-hover:text-red-600 transition-colors duration-150" style="font-size:18px;">logout</span>
      </div>

      <span
        class="text-sm font-medium text-red-500 group-hover:text-red-600 whitespace-nowrap transition-all duration-200"
        [class.opacity-0]="sidebar.collapsed()"
        [class.w-0]="sidebar.collapsed()">
        Logout
      </span>
    </div>
  </div>

</aside>
