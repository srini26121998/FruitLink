<div class="p-2 rounded-2xl bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 shadow-sm">

  <!-- Label + Icon -->
  <div class="flex items-center justify-between">
    <p class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">
      {{ title }}
    </p>

    @if (icon) {
      <i class="{{ icon }} text-xl" [ngClass]="iconColor"></i>
    }
  </div>

  <!-- Value + Growth -->
  <div class="mt-2 flex items-center gap-2">
    <h2 class="text-base font-medium" [ngClass]="textColor">
      {{ value }}
    </h2>

    @if (growth() !== null) {
      <span class="text-sm font-semibold flex items-center gap-1"
            [ngClass]="growthColor()">
        {{ arrow() }} {{ growthText() }}
      </span>
    }
  </div>

  <!-- Sparkline -->
  @if (trendData.length > 0) {
    <div class="mt-3 h-10">
      <apx-chart
        [series]="sparklineChart().series"
        [chart]="sparklineChart().chart"
        [stroke]="sparklineChart().stroke"
        [colors]="sparklineChart().colors">
      </apx-chart>
    </div>
  }
</div>
