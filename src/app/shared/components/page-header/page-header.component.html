<div class="flex items-center justify-between mb-4 sm:mb-6 animate-fade-in-down">

  <!-- LEFT SECTION -->
  <div class="min-w-0 pr-4">
    <h1 class="text-lg sm:text-xl md:text-2xl font-bold text-gray-900 tracking-tight truncate">{{ title }}</h1>
    <p *ngIf="subtitle" class="text-xs sm:text-sm text-gray-500 mt-0.5 sm:mt-1 font-medium truncate">
      {{ subtitle }}
    </p>
  </div>

  <!-- RIGHT ACTION BUTTON -->
  <button
    *ngIf="actionLabel"
    (click)="actionCallback?.()"
    class="btn-primary flex-shrink-0"
  >
    <span *ngIf="actionIcon" class="material-symbols-rounded" style="font-size:18px;">{{ actionIcon }}</span>
    <span class="hidden sm:inline">{{ actionLabel }}</span>
    <span class="sm:hidden">{{ actionLabel }}</span>
  </button>

</div>
